<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#111318">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- ?debug=1 : FPS 표시 · ?test=1 : 자동 테스트 모드 · ?seed=N : 퍼즐 난수 고정 -->
  <title>멜로디아: 끝나지 않는 노래 v0.1</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(0deg, rgba(255, 250, 240, .05) 0 2px, transparent 2px 13px),
        linear-gradient(180deg, #1b1512 0%, #111318 46%, #0e0c0a 100%);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      overscroll-behavior: none;
      box-sizing: border-box;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #game {
      display: block;
      margin: 0 auto;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      outline: none;
      touch-action: none;
      border: 1px solid rgba(0,0,0,.5);
      box-shadow: 0 0 24px rgba(0,0,0,.55);
    }
    #rotateOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 5;
      color: #fffdf7;
      background:
        repeating-linear-gradient(0deg, rgba(255, 250, 240, .05) 0 2px, transparent 2px 13px),
        linear-gradient(180deg, #1b1512 0%, #111318 46%, #0e0c0a 100%);
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.45;
    }
    @media (orientation: landscape) and (max-height: 560px) {
      #rotateOverlay { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="멜로디아 게임 화면"></canvas>
  <div id="rotateOverlay">𝄞<br>세로 화면으로 돌려주세요.<br>멜로디아는 모바일 세로 모드에 맞춰져 있어요.</div>
  <script>
  'use strict';

  const Game = (() => {
    const PARAMS = new URLSearchParams(window.location.search);
    const seedRaw = PARAMS.get('seed');

    function mulberry32(seed) {
      let a = seed >>> 0;
      return function seededRandom() {
        a += 0x6D2B79F5;
        let t = a;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // CONFIG
    const CONFIG = {
      W: 360,
      H: 640,
      TILE: 32,
      PLAYER_SPEED: 116,
      PLAYER_W: 20,
      PLAYER_H: 24,
      SAVE_KEY: 'melodia_v01_save',
      STEP: 'v0.1 Phase 1: Step 1-10',
      DEBUG: PARAMS.has('debug'),
      TEST: PARAMS.get('test') === '1',
      SEED: seedRaw !== null && seedRaw !== '' && Number.isFinite(Number(seedRaw)) ? Number(seedRaw) : null,
      REDUCED_MOTION: Boolean(window.matchMedia?.('(prefers-reduced-motion: reduce)').matches),
      colors: {
        ink: '#202026',
        panel: '#fffaf0',
        panelDark: '#42362f',
        text: '#2b2724',
        village: '#FFF3E0',
        villageRoad: '#E8CDA7',
        villageWood: '#8D6E63',
        forest: '#66BB6A',
        forestDeep: '#2F7D46',
        forestRoad: '#B7D982',
        canyon: '#9575CD',
        ruin: '#A1887F',
        mountain: '#90CAF9',
        catacomb: '#4A148C',
        hall: '#FFB300',
        water: '#4CA7C7',
        wall: '#4D4B50',
        gold: '#FFD54F',
        cyan: '#4DD0E1',
        blue: '#42A5F5',
        green: '#43A047',
        danger: '#D95E59'
      },
      assets: {
        clef_g: '01 Source/G Clef/G Clef.png',
        clef_f: '01 Source/F Clef/F Clef.png',
        clef_c: '01 Source/C Clef/C Clef.png',
        rest_eighth: '01 Source/Eight Rest/Eight Rest.png',
        fermata: '01 Source/Fermata/Fermata.png',
        segno: '01 Source/Segno/Segno.png',
        repeat_start: '01 Source/Repeat-Sign 1/Repeat-Sign 1.png',
        repeat_end: '01 Source/Repeat-Sign 2/Repeat-Sign 2.png',
        coda: '01 Source/Coda.png',
        ending_one: '01 Source/1st Ending.jpg',
        ending_two: '01 Source/2nd Ending.jpg',
        ending_both: '01 Source/1st&2nd Ending.jpg'
      },
      palettes: {
        village: { ground: '#FFF3E0', alt: '#F8E1BD', road: '#E8CDA7', wall: '#8D6E63' },
        tower: { ground: '#F5E6C8', alt: '#E6D2AA', road: '#C49A6C', wall: '#6D4C41' },
        forest: { ground: '#66BB6A', alt: '#55A95A', road: '#B7D982', wall: '#2F7D46' }
      },
      states: ['Boot', 'Title', 'Explore', 'Dialogue', 'SymbolSelect', 'TimelineEdit', 'Puzzle', 'Cutscene', 'Pause']
    };
    const rng = CONFIG.SEED !== null ? mulberry32(CONFIG.SEED) : Math.random;
    const t2p = (v) => v * CONFIG.TILE;
    const p2t = (v) => Math.floor(v / CONFIG.TILE);
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const lerp = (a, b, t) => a + (b - a) * t;
    const rectsOverlap = (a, b) => a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    const centerOf = (rect) => ({ x: rect.x + rect.w / 2, y: rect.y + rect.h / 2 });

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    let dpr = 1;
    let gameState = 'Boot';
    let prevState = 'Boot';
    let lastTime = 0;
    let accumulator = 0;
    let fps = 0;
    let frameCount = 0;
    let fpsClock = 0;
    let positionSaveTimer = 0;

    function setState(next) {
      if (!CONFIG.states.includes(next)) {
        console.warn('알 수 없는 GameState:', next);
        return;
      }
      if (gameState === next) return;
      prevState = gameState;
      gameState = next;
      document.body.dataset.prevState = prevState;
      document.body.dataset.gameState = next;
      document.title = next === 'Title' ? '멜로디아 - 타이틀' : '멜로디아 - 모험 중';
      if (next === 'Title') refreshTitleHasSave();
      try {
        HINT.reset();
      } catch (err) {
        // HINT is initialized later.
      }
      if (next !== 'Dialogue') INPUT.clearMovement();
    }

    function refreshTitleHasSave() {
      try {
        SCENES.titleHasSave = SAVE.hasSave();
      } catch (err) {
        // SCENES/SAVE are initialized later; early state changes can skip this safely.
      }
    }

    function markTitleHasSave(value) {
      try {
        SCENES.titleHasSave = value;
      } catch (err) {
        // SCENES is not available during initial object construction.
      }
    }

    function resize() {
      const ratio = CONFIG.W / CONFIG.H;
      let cssW = window.visualViewport?.width || window.innerWidth;
      let cssH = window.visualViewport?.height || window.innerHeight;
      const bodyStyle = window.getComputedStyle(document.body);
      const safeY = (parseFloat(bodyStyle.paddingTop) || 0) + (parseFloat(bodyStyle.paddingBottom) || 0);
      cssH = Math.max(1, cssH - safeY);
      if (cssW / cssH > ratio) cssW = Math.floor(cssH * ratio);
      else cssH = Math.floor(cssW / ratio);
      dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      canvas.style.width = `${cssW}px`;
      canvas.style.height = `${cssH}px`;
      canvas.width = Math.floor(CONFIG.W * dpr);
      canvas.height = Math.floor(CONFIG.H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
    }

    function screenToGame(e) {
      const r = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - r.left) * CONFIG.W / r.width,
        y: (e.clientY - r.top) * CONFIG.H / r.height
      };
    }

    function screenToWorld(p) {
      return {
        x: p.x + SCENES.camera.x,
        y: p.y + SCENES.camera.y
      };
    }

    // AUDIO
    const AUDIO = {
      ctx: null,
      master: null,
      bgmGain: null,
      unlocked: false,
      muted: false,
      bgmKey: '',
      bgmIndex: 0,
      bgmTimer: 0,
      bgmSwap: null,
      bgmBeat: 0,
      onceWarned: false,
      sequences: {
        title: { bpm: 56, notes: [['C4', 2], ['G4', 2], ['E4', 2], [null, 2]], gain: 0.08 },
        villageQuiet: { bpm: 72, notes: [['C3', 4], [null, 4]] },
        villageMelody: {
          bpm: 90,
          notes: [['C4', 2], ['E4', 1], ['G4', 1], ['C5', 2], ['G4', 2],
            ['A4', 1], ['G4', 1], ['E4', 1], ['G4', 1], ['C4', 4],
            ['D4', 1], ['E4', 1], ['F4', 1], ['G4', 1], ['E4', 2], ['C4', 2],
            ['D4', 2], ['B3', 2], ['C4', 4]]
        },
        forest: { bpm: 72, notes: [['C4', 1], ['E4', 1], ['G4', 1], ['E4', 1], [null, 2]] },
        tower: { bpm: 60, notes: [['C3', 2], ['G3', 2], [null, 2], ['E3', 2]] }
      },
      unlock() {
        if (this.unlocked) return;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          this.ctx = new AC();
          this.master = this.ctx.createGain();
          this.master.gain.value = CONFIG.TEST ? 0 : (DATA.soundOn ? 0.18 : 0);
          this.master.connect(this.ctx.destination);
          this.bgmGain = this.ctx.createGain();
          this.bgmGain.gain.value = 1;
          this.bgmGain.connect(this.master);
          const b = this.ctx.createBuffer(1, 1, 22050);
          const s = this.ctx.createBufferSource();
          s.buffer = b;
          s.connect(this.master);
          s.start(0);
          this.ctx.resume();
          this.unlocked = true;
        } catch (err) {
          if (!this.onceWarned) console.warn('오디오 초기화 실패:', err);
          this.onceWarned = true;
        }
      },
      resume() {
        try {
          if (this.ctx && (this.ctx.state === 'suspended' || this.ctx.state === 'interrupted')) {
            this.ctx.resume();
          }
        } catch (err) {
          // Some mobile browsers reject resume outside a gesture; the next tap retries.
        }
      },
      setMuted(muted) {
        this.muted = muted;
        DATA.soundOn = !muted;
        if (this.master) this.master.gain.value = CONFIG.TEST ? 0 : (DATA.soundOn ? 0.18 : 0);
        SAVE.write('settings');
      },
      noteToMidi(name) {
        const m = /^([A-G])([#b]?)(-?\d)$/.exec(name);
        if (!m) return 60;
        const base = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 }[m[1]];
        const acc = m[2] === '#' ? 1 : (m[2] === 'b' ? -1 : 0);
        return (Number(m[3]) + 1) * 12 + base + acc;
      },
      noteToFreq(name) {
        const midi = this.noteToMidi(name);
        return 440 * Math.pow(2, (midi - 69) / 12);
      },
      playNote(name, dur = 0.35, when = 0, gain = 0.42, bus = 'master') {
        if (!this.unlocked || !this.ctx || !DATA.soundOn || !name) return;
        const start = this.ctx.currentTime + when;
        const freq = this.noteToFreq(name);
        const out = this.ctx.createGain();
        out.gain.setValueAtTime(0.0001, start);
        out.gain.exponentialRampToValueAtTime(gain, start + 0.012);
        out.gain.exponentialRampToValueAtTime(0.0001, start + dur);
        out.connect(bus === 'bgm' && this.bgmGain ? this.bgmGain : this.master);
        const sine = this.ctx.createOscillator();
        const tri = this.ctx.createOscillator();
        sine.type = 'sine';
        tri.type = 'triangle';
        sine.frequency.value = freq;
        tri.frequency.value = freq;
        const sg = this.ctx.createGain();
        const tg = this.ctx.createGain();
        sg.gain.value = 0.58;
        tg.gain.value = 0.24;
        sine.connect(sg);
        tri.connect(tg);
        sg.connect(out);
        tg.connect(out);
        sine.start(start);
        tri.start(start);
        sine.stop(start + dur + 0.04);
        tri.stop(start + dur + 0.04);
      },
      playChord(names, mode = 'arp') {
        if (mode === 'arp') names.forEach((n, i) => this.playNote(n, 0.42, i * 0.08, 0.32));
        names.forEach((n) => this.playNote(n, 0.55, mode === 'arp' ? 0.28 : 0, 0.18));
      },
      sfxPickup() {
        this.playNote('C5', 0.16, 0, 0.32);
        this.playNote('C6', 0.26, 0.08, 0.24);
      },
      sfxSuccess() {
        this.playNote('C4', 0.16, 0, 0.26);
        this.playNote('G4', 0.24, 0.09, 0.25);
      },
      sfxFail() {
        this.playNote('C4', 0.12, 0, 0.15);
        this.playNote('C#4', 0.14, 0.07, 0.12);
      },
      sfxTick(low = false) {
        if (!this.unlocked || !this.ctx || !DATA.soundOn) return;
        const start = this.ctx.currentTime;
        const out = this.ctx.createGain();
        out.gain.setValueAtTime(0.0001, start);
        out.gain.exponentialRampToValueAtTime(low ? 0.07 : 0.10, start + 0.004);
        out.gain.exponentialRampToValueAtTime(0.0001, start + 0.034);
        out.connect(this.master);
        const osc = this.ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = low ? 1200 : 2500;
        osc.connect(out);
        osc.start(start);
        osc.stop(start + 0.04);
      },
      sfxDoor() {
        this.playNote('C3', 0.18, 0, 0.25);
        this.playNote('G3', 0.22, 0.09, 0.23);
        this.playNote('C4', 0.32, 0.2, 0.20);
      },
      setBgm(key) {
        if (this.bgmKey === key || this.bgmSwap?.key === key) return;
        if (this.unlocked && this.ctx && this.bgmGain) {
          this.bgmSwap = { key, timer: 0.28 };
          const now = this.ctx.currentTime;
          this.bgmGain.gain.cancelScheduledValues(now);
          this.bgmGain.gain.setValueAtTime(this.bgmGain.gain.value, now);
          this.bgmGain.gain.linearRampToValueAtTime(0.0001, now + 0.28);
          return;
        }
        this.applyBgm(key);
      },
      applyBgm(key) {
        this.bgmKey = key;
        this.bgmIndex = 0;
        this.bgmTimer = 0;
        this.bgmSwap = null;
        if (this.unlocked && this.ctx && this.bgmGain) {
          const now = this.ctx.currentTime;
          this.bgmGain.gain.cancelScheduledValues(now);
          this.bgmGain.gain.setValueAtTime(0.0001, now);
          this.bgmGain.gain.linearRampToValueAtTime(1, now + 0.36);
        }
      },
      update(dt) {
        if (!this.unlocked || !DATA.soundOn) return;
        if (this.bgmSwap) {
          this.bgmSwap.timer -= dt;
          if (this.bgmSwap.timer <= 0) this.applyBgm(this.bgmSwap.key);
        }
        if (!this.bgmKey) return;
        const seq = this.sequences[this.bgmKey];
        if (!seq) return;
        this.bgmTimer -= dt;
        if (this.bgmTimer > 0) return;
        const item = seq.notes[this.bgmIndex % seq.notes.length];
        const beatDur = 60 / seq.bpm;
        if (item[0]) this.playNote(item[0], Math.min(0.55, beatDur * item[1] * 0.72), 0, seq.gain || 0.12, 'bgm');
        this.bgmTimer = beatDur * item[1];
        this.bgmIndex += 1;
      }
    };

    function haptic(pattern) {
      try {
        if (DATA.hapticsOn) navigator.vibrate?.(pattern);
      } catch (err) {
        // Haptics are optional and unavailable on some browsers.
      }
    }

    // INPUT
    const INPUT = {
      keys: new Set(),
      joy: { active: false, id: null, baseX: 0, baseY: 0, x: 0, y: 0, vx: 0, vy: 0 },
      lastTile: { x: -1, y: -1 },
      down(p, id) {
        if (gameState === 'Explore' && p.x < CONFIG.W * 0.5 && p.y > 72) {
          this.joy.active = true;
          this.joy.id = id;
          this.joy.baseX = p.x;
          this.joy.baseY = p.y;
          this.joy.x = p.x;
          this.joy.y = p.y;
          this.updateJoy(p);
        }
      },
      move(p, id) {
        if (this.joy.active && this.joy.id === id) this.updateJoy(p);
      },
      up(id) {
        if (this.joy.active && this.joy.id === id) this.clearMovement();
      },
      updateJoy(p) {
        const dx = p.x - this.joy.baseX;
        const dy = p.y - this.joy.baseY;
        const len = Math.hypot(dx, dy);
        const max = 48;
        const scale = len > max ? max / len : 1;
        this.joy.x = this.joy.baseX + dx * scale;
        this.joy.y = this.joy.baseY + dy * scale;
        if (len < 8) {
          this.joy.vx = 0;
          this.joy.vy = 0;
        } else {
          this.joy.vx = dx / Math.max(1, len);
          this.joy.vy = dy / Math.max(1, len);
        }
      },
      clearMovement() {
        this.joy.active = false;
        this.joy.id = null;
        this.joy.vx = 0;
        this.joy.vy = 0;
      },
      movementVector() {
        let x = 0;
        let y = 0;
        if (this.keys.has('KeyA') || this.keys.has('ArrowLeft')) x -= 1;
        if (this.keys.has('KeyD') || this.keys.has('ArrowRight')) x += 1;
        if (this.keys.has('KeyW') || this.keys.has('ArrowUp')) y -= 1;
        if (this.keys.has('KeyS') || this.keys.has('ArrowDown')) y += 1;
        x += this.joy.vx;
        y += this.joy.vy;
        const len = Math.hypot(x, y);
        if (len > 1) {
          x /= len;
          y /= len;
        }
        return { x, y };
      }
    };

    // MAP
    const MAPS = {};

    function grid(w, h, fill = 0) {
      return Array.from({ length: h }, () => Array.from({ length: w }, () => fill));
    }

    function rect(gridData, x, y, w, h, value) {
      for (let yy = y; yy < y + h; yy += 1) {
        for (let xx = x; xx < x + w; xx += 1) {
          if (gridData[yy] && typeof gridData[yy][xx] !== 'undefined') gridData[yy][xx] = value;
        }
      }
    }

    function addBorder(collision, w, h) {
      rect(collision, 0, 0, w, 1, 1);
      rect(collision, 0, h - 1, w, 1, 1);
      rect(collision, 0, 0, 1, h, 1);
      rect(collision, w - 1, 0, 1, h, 1);
    }

    function buildMaps() {
      const villageGround = grid(30, 20, 0);
      const villageCollision = grid(30, 20, 0);
      addBorder(villageCollision, 30, 20);
      rect(villageGround, 13, 0, 5, 20, 1);
      rect(villageGround, 0, 9, 30, 3, 1);
      rect(villageGround, 2, 15, 7, 3, 1);
      rect(villageGround, 21, 15, 6, 3, 1);
      rect(villageCollision, 14, 2, 4, 4, 1);
      rect(villageCollision, 3, 14, 4, 3, 1);
      rect(villageCollision, 21, 14, 4, 3, 1);
      rect(villageCollision, 4, 9, 2, 2, 1);
      MAPS.village = {
        id: 'village',
        name: '하모니아 마을',
        w: 30,
        h: 20,
        palette: 'village',
        ground: villageGround,
        collision: villageCollision,
        spawns: {
          start: { x: 15.5, y: 16 },
          fromTower: { x: 15.5, y: 7.5 },
          west: { x: 27, y: 10.5 },
          ending: { x: 15.5, y: 8.4 }
        },
        objects: [
          { id: 'tower_body', type: 'decor', x: 14, y: 2, w: 4, h: 4, glyph: '♪', label: '오르골 탑' },
          { id: 'tower_door', type: 'towerDoor', x: 15, y: 6, w: 2, h: 1, attachTargets: ['clef_g'], label: '탑 문' },
          { id: 'clef', type: 'npc', x: 15, y: 9, role: 'elder', label: '클레프', dialogue: [
            { if: { quest: 'MQ01', is: 'not_started' }, use: 'clef_intro' },
            { if: { flag: 'forest_gate_open' }, use: 'clef_after_gate' },
            { use: 'clef_wait' }
          ] },
          { id: 'pitch', type: 'npc', x: 6, y: 10, role: 'child', label: '피치', dialogue: [
            { if: { flag: 'tower_examined', notFlag: 'pitch_hint' }, use: 'pitch_hint' },
            { if: { flag: 'got_clef_g' }, use: 'pitch_after_clef' },
            { use: 'pitch_hello' }
          ] },
          { id: 'well', type: 'sign', x: 4, y: 9, w: 2, h: 2, label: '우물', dialogue: 'well_sign' },
          { id: 'clef_bush', type: 'pickup', x: 5, y: 8, symbol: 'clef_g', label: '반짝이는 수풀',
            requiresFlags: ['tower_examined', 'pitch_hint'], hideIfFlag: 'got_clef_g' },
          { id: 'forest_gate', type: 'forestGate', x: 28, y: 10, w: 1, h: 2, label: '숲 관문' },
          { id: 'forest_sign', type: 'sign', x: 26, y: 10, label: '숲 표지판', dialogue: 'forest_sign_closed' }
        ],
        above: [
          { x: 2, y: 3, w: 3, h: 2, color: '#C4A06B' },
          { x: 24, y: 3, w: 3, h: 2, color: '#C4A06B' }
        ]
      };

      const towerGround = grid(14, 12, 5);
      const towerCollision = grid(14, 12, 0);
      addBorder(towerCollision, 14, 12);
      rect(towerGround, 4, 2, 6, 7, 1);
      MAPS.tower = {
        id: 'tower',
        name: '오르골 탑 내부',
        w: 14,
        h: 12,
        palette: 'tower',
        ground: towerGround,
        collision: towerCollision,

    function currentMap() {
      return MAPS[DATA.currentMap];
    }

    function tileAt(map, tx, ty) {
      if (!map || ty < 0 || tx < 0 || ty >= map.h || tx >= map.w) return 1;
      return map.ground[ty][tx];
    }

    function objectRect(obj) {
      return {
        x: t2p(obj.x),
        y: t2p(obj.y),
        w: t2p(obj.w || 1),
        h: t2p(obj.h || 1)
      };
    }

    function isObjectVisible(obj) {
      if (obj.hideIfFlag && DATA.flags[obj.hideIfFlag]) return false;
      if (obj.requiresFlags && !obj.requiresFlags.every((f) => DATA.flags[f])) return false;
      return true;
    }

    function syncObjectsFromFlags(map = currentMap()) {
      if (!map) return;
      map.objects.forEach((obj) => {
        if (obj.type === 'staffSlot') {
          obj.placed = Boolean(DATA.flags[`bridge_${obj.staffSlot}`]);
          obj.placedSymbol = obj.placed ? obj.expected : null;
        }
        if (obj.id === 'tower_door') obj.open = Boolean(DATA.flags.tower_door_open);
        if (obj.id === 'staff_door') obj.open = Boolean(DATA.flags.staff_door_open);
      });
    }

    function loadMap(id, spawn = 'start', shouldSave = true) {
      DATA.currentMap = id;
      document.body.dataset.mapId = id;
      const map = currentMap();
      syncObjectsFromFlags(map);
      const sp = map.spawns[spawn] || map.spawns.start || { x: 2, y: 2 };
      ENTITIES.player.x = t2p(sp.x) - CONFIG.PLAYER_W / 2;
      ENTITIES.player.y = t2p(sp.y) - CONFIG.PLAYER_H / 2;
      ENTITIES.player.faceX = 0;
      ENTITIES.player.faceY = 1;
      SCENES.camera.x = clamp(ENTITIES.player.x - CONFIG.W / 2, 0, Math.max(0, t2p(map.w) - CONFIG.W));
      SCENES.camera.y = clamp(ENTITIES.player.y - CONFIG.H / 2, 0, Math.max(0, t2p(map.h) - CONFIG.H));
      INPUT.lastTile = { x: -1, y: -1 };
      if (id === 'forest') AUDIO.setBgm('forest');
      else if (id === 'tower') AUDIO.setBgm('tower');
      else AUDIO.setBgm(DATA.scoreParts.melody ? 'villageMelody' : 'villageQuiet');
      if (shouldSave) SAVE.write('map');
    }

    function transitionToMap(id, spawn = 'start') {
      if (SCENES.transition.active) return;
      SCENES.transition = { active: true, phase: 'out', alpha: 0, to: id, spawn };
      INPUT.clearMovement();
    }

    function isBridgeOverride(tx, ty) {
      const map = currentMap();
      if (!map || map.id !== 'forest') return false;
      return map.objects.some((obj) => obj.type === 'staffSlot' && obj.placed && obj.x === tx && obj.y === ty);
    }

    function isSolidObject(obj) {
      if (!isObjectVisible(obj)) return false;
      if (obj.type === 'rock') return true;
      if (obj.type === 'forestGate') return !DATA.flags.forest_gate_open;
      if (obj.type === 'staffDoor') return !DATA.flags.staff_door_open;
      return false;
    }

    function isBlockedRect(rect, ignoreObject = null) {
      const map = currentMap();
      const corners = [
        [rect.x, rect.y],
        [rect.x + rect.w - 1, rect.y],
        [rect.x, rect.y + rect.h - 1],
        [rect.x + rect.w - 1, rect.y + rect.h - 1]
      ];
      for (const [x, y] of corners) {
        const tx = p2t(x);
        const ty = p2t(y);
        if (!isBridgeOverride(tx, ty) && (!map || !map.collision[ty] || map.collision[ty][tx])) return true;
      }
      for (const obj of map.objects) {
        if (obj === ignoreObject || !isSolidObject(obj)) continue;
        if (rectsOverlap(rect, objectRect(obj))) return true;
      }
      return false;
    }

    // ENTITIES
    const ENTITIES = {
      player: { x: 0, y: 0, faceX: 0, faceY: 1, moving: false },
      particles: [],
      dustTimer: 0,
      push: { id: null, timer: 0 },
      addParticle(x, y, text, color = CONFIG.colors.gold) {
        if (this.particles.length > 48) this.particles.shift();
        this.particles.push({ x, y, text, color, life: CONFIG.REDUCED_MOTION ? 0.5 : 1, vy: -22 });
      },
      addDotParticle(x, y, color = 'rgba(43,39,36,.34)') {
        if (this.particles.length > 48) this.particles.shift();
        this.particles.push({ kind: 'dot', x, y, color, life: 0.42, vy: -4, r: 3 + rng() * 2 });
      },
      playerRect(nx = this.player.x, ny = this.player.y) {
        return { x: nx, y: ny, w: CONFIG.PLAYER_W, h: CONFIG.PLAYER_H };
      },
      playerCenter() {
        return { x: this.player.x + CONFIG.PLAYER_W / 2, y: this.player.y + CONFIG.PLAYER_H / 2 };
      },
      update(dt) {
        if (gameState === 'Explore' && !SCENES.transition.active) {
          const mv = INPUT.movementVector();
          this.player.moving = Math.hypot(mv.x, mv.y) > 0.05;
          if (this.player.moving) {
            HINT.reset();
            this.player.faceX = Math.abs(mv.x) > Math.abs(mv.y) ? Math.sign(mv.x) : 0;
            this.player.faceY = Math.abs(mv.y) >= Math.abs(mv.x) ? Math.sign(mv.y) : 0;
            const step = CONFIG.PLAYER_SPEED * dt;
            const nx = this.player.x + mv.x * step;
            if (!isBlockedRect(this.playerRect(nx, this.player.y))) this.player.x = nx;
            const ny = this.player.y + mv.y * step;
            if (!isBlockedRect(this.playerRect(this.player.x, ny))) this.player.y = ny;
            this.dustTimer -= dt;
            if (!CONFIG.REDUCED_MOTION && this.dustTimer <= 0) {
              this.dustTimer = 0.22;
              this.addDotParticle(this.player.x + CONFIG.PLAYER_W / 2, this.player.y + CONFIG.PLAYER_H + 1);
            }
            this.updateRockPush(dt, mv);
          } else {
            this.dustTimer = 0;
            this.push.timer = 0;
            this.push.id = null;
          }
          this.checkStepTriggers();
        }
        this.updateObjectAnimations(dt);
        for (let i = this.particles.length - 1; i >= 0; i -= 1) {
          const p = this.particles[i];
          p.life -= dt;
          p.y += p.vy * dt;
          if (p.life <= 0) this.particles.splice(i, 1);
        }
      },
      updateObjectAnimations(dt) {
        const map = currentMap();
        if (!map) return;
        map.objects.forEach((obj) => {
          if (obj.type !== 'towerDoor' || !obj.openAnim) return;
          obj.openAnim += dt;
          const notes = ['C4', 'D4', 'E4', 'F4', 'G4'];
          const step = Math.min(4, Math.floor(obj.openAnim / 0.12));
          obj.openStep = obj.openStep ?? -1;
          while (obj.openStep < step) {
            obj.openStep += 1;
            AUDIO.playNote(notes[obj.openStep], 0.16, 0, 0.18);
          }
          if (obj.openAnim >= 0.9 && !DATA.flags.tower_door_open) {
            DATA.flags.tower_door_open = true;
            QUEST.setObjective('MQ01', '탑 안에서 세계악보를 조사하자');
            AUDIO.sfxDoor();
            haptic([30, 60, 30]);
            for (let i = 0; i < 10; i += 1) {
              ENTITIES.addParticle(t2p(obj.x) + 16 + (i % 2) * 24, t2p(obj.y) + 22, '♪', CONFIG.colors.gold);
            }
            UI.toast('탑 문 위에 오선이 되살아났어요');
            SAVE.write('puzzle');
            obj.openAnim = 0;
          }
        });
      },
      updateRockPush(dt, mv) {
        const target = UI.getInteractTarget();
        if (!target || target.type !== 'rock') {
          this.push.timer = 0;
          this.push.id = null;
          return;
        }
        const dirX = Math.abs(mv.x) > Math.abs(mv.y) ? Math.sign(mv.x) : 0;
        const dirY = Math.abs(mv.y) >= Math.abs(mv.x) ? Math.sign(mv.y) : 0;
        const pc = this.playerCenter();
        const rc = centerOf(objectRect(target));
        const toward = Math.sign(rc.x - pc.x) === dirX || Math.sign(rc.y - pc.y) === dirY;
        if (!toward || (dirX === 0 && dirY === 0)) return;
        if (this.push.id !== target.id) {
          this.push.id = target.id;
          this.push.timer = 0;
        }
        this.push.timer += dt;
        if (this.push.timer < 0.4) return;
        this.push.timer = 0;
        const nx = target.x + dirX;
        const ny = target.y + dirY;
        const nextRect = { x: t2p(nx), y: t2p(ny), w: CONFIG.TILE, h: CONFIG.TILE };
        if (!isBlockedRect(nextRect, target)) {
          target.x = nx;
          target.y = ny;
          AUDIO.sfxSuccess();
          UI.toast('바위가 한 칸 밀렸어요');
        } else {
          AUDIO.sfxFail();
        }
      },
      checkStepTriggers() {
        const c = this.playerCenter();
        const tx = p2t(c.x);
        const ty = p2t(c.y);
        if (INPUT.lastTile.x === tx && INPUT.lastTile.y === ty) return;
        INPUT.lastTile = { x: tx, y: ty };
        const map = currentMap();
        for (const obj of map.objects) {
          if (!isObjectVisible(obj) || obj.x !== tx || obj.y !== ty) continue;
          if (obj.type === 'bell') PUZZLES.stepBell(obj);
          if (obj.type === 'staffSlot' && obj.placed) PUZZLES.stepBridgeSlot(obj);
          if (obj.type === 'portal') transitionToMap(obj.to, obj.spawn);
        }
        if (map.id === 'village') {
          const gate = map.objects.find((o) => o.id === 'forest_gate');
          if (gate && DATA.flags.forest_gate_open && tx >= 28 && tx <= 29 && ty >= 10 && ty <= 11) {
            transitionToMap('forest', 'fromVillage');
          }
        }
      }
    };

      }
    };

    const DIALOGUE = {
      active: null,
      index: 0,
      chars: 0,
      log: [],
      charRate: CONFIG.TEST ? 1000 : 30,
      start(key) {
        const data = DIALOGUES[key];
        if (!data) return;
        this.active = { key, logged: {}, ...data };
        this.index = 0;
        this.chars = 0;
        setState('Dialogue');
      },
      update(dt) {
        if (gameState !== 'Dialogue' || !this.active) return;
        const line = this.active.lines[this.index] || '';
        this.chars = Math.min(line.length, this.chars + this.charRate * dt);
      },
      rememberLine() {
        if (!this.active) return;
        const line = this.active.lines[this.index] || '';
        if (!line) return;
        const key = `${this.active.key}:${this.index}`;
        if (this.active.logged[key]) return;
        this.active.logged[key] = true;
        this.log.push({ speaker: this.active.speaker, line });
        if (this.log.length > 30) this.log.shift();
      },
      advance() {
        if (!this.active) return;
        const line = this.active.lines[this.index] || '';
        if (this.chars < line.length) {
          this.chars = line.length;
          this.rememberLine();
          return;
        }
        this.rememberLine();
        this.index += 1;
        if (this.index < this.active.lines.length) {
          this.chars = 0;
          return;
        }
        const end = this.active.onEnd;
        this.active = null;
        this.index = 0;
        this.chars = 0;
        setState('Explore');
        if (end) applyDialogueEnd(end);
      }
    };

    function applyDialogueEnd(end) {
      if (end.questStart) QUEST.start(end.questStart, end.objective);
      if (end.objective) {
        if (Array.isArray(end.objective)) QUEST.setObjective(end.objective[0], end.objective[1]);
        else if (end.questStart) QUEST.setObjective(end.questStart, end.objective);
      }
      if (end.flag) {
        DATA.flags[end.flag] = true;
        SAVE.write('quest');
      }
      if (end.addSymbol) addSymbol(end.addSymbol);
      if (end.prologueComplete) {
        DATA.flags.world_score_seen = true;
        QUEST.complete('MQ01');
        QUEST.reward('MQ01');
        QUEST.start('MQ02', '도레미 숲에서 사라진 음표를 되찾자');
        DATA.flags.forest_gate_open = true;
        UI.toast('숲 관문이 열렸어요');
        SAVE.write('quest');
      }
    }

    const SPEAKER_STYLE = {
      '클레프': { color: '#3F8E64', glyph: '𝄞' },
      '피치': { color: '#E2A93B', glyph: '♪' },
      '라라': { color: '#8E5BB8', glyph: '♫' },
      '템포': { color: '#2E9BB0', glyph: '♩' },
      '까마귀': { color: '#6D5342', glyph: '♬' },
      object: { color: '#8D6E63', glyph: '·' }
    };

    function speakerStyle(name) {
      return SPEAKER_STYLE[name] || SPEAKER_STYLE.object;
    }

    function resolveDialogueForObject(obj) {
      if (typeof obj.dialogue === 'string') {
        if (obj.id === 'forest_sign' && DATA.flags.forest_gate_open) return 'forest_sign_open';
        return obj.dialogue;
      }
      if (Array.isArray(obj.dialogue)) {
        for (const branch of obj.dialogue) {
          if (!branch.if || branchMatches(branch.if)) return branch.use;
        }
      }
      return null;
    }

    function branchMatches(cond) {
      if (cond.quest && QUEST.state(cond.quest) !== cond.is) return false;
      if (cond.flag && !DATA.flags[cond.flag]) return false;
      if (cond.notFlag && DATA.flags[cond.notFlag]) return false;
      return true;
    }

    const HINTS = {
      prologue_find_clef: {
        when: { flag: 'tower_examined', notFlag: 'got_clef_g' },
        map: 'village',
        idle: 30,
        t1: '템포: 피치가 뭔가 봤다던데, 물어볼까?',
        t2: '템포: 우물 뒤 수풀이 반짝이고 있어!'
      },
      prologue_attach: {
        when: { flag: 'got_clef_g', notFlag: 'tower_door_open' },
        map: 'village',
        idle: 30,
        t1: '템포: 팔레트(♪ 버튼)에서 기호를 골라 보자.',
        t2: '템포: 높은음자리표를 탑 문에 붙이면 돼!'
      },
      forest_bridge: {
        when: { flag: 'got_note_g', notFlag: 'staff_door_open' },
        map: 'forest',
        idle: 45,
        t1: '라라: 세 음을 오선의 제자리에 놓아 보렴.',
        t2: '라라: 도는 덧줄, 미는 첫째 줄, 솔은 둘째 줄. 낮은 음부터 밟는 거야.'
      },
      crow_song: {
        whenFn: () => PUZZLES.bird.active && !DATA.flags.got_note_e,
        map: 'forest',
        idle: 30,
        t1: '템포: 첫 음이 제일 낮았어? 높았어?',
        t2: '템포: 종에 적힌 글자를 봐. 들린 순서대로만 밟으면 돼!'
      }
    };

    const HINT = {
      idle: 0,
      activeKey: null,
      seen: {},
      reset() {
        this.idle = 0;
      },
      update(dt) {
        if (gameState !== 'Explore') return;
        const match = Object.entries(HINTS).find(([, hint]) => this.matches(hint));
        if (!match) {
          this.activeKey = null;
          this.idle = 0;
          return;
        }
        const [key, hint] = match;
        if (this.activeKey !== key) {
          this.activeKey = key;
          this.idle = 0;
        }
        this.idle += dt;
        const speed = CONFIG.TEST ? 0.1 : 1;
        const base = hint.idle * speed;
        const level = this.seen[key] || 0;
        if (level === 0 && this.idle >= base) {
          UI.toast(hint.t1, 3);
          this.seen[key] = 1;
          this.idle = 0;
        } else if (level === 1 && this.idle >= base * 1.5) {
          UI.toast(hint.t2, 3);
          this.seen[key] = 2;
          this.idle = 0;
        }
      },
      matches(hint) {
        if (hint.map && DATA.currentMap !== hint.map) return false;
        if (hint.when && !branchMatches(hint.when)) return false;
        if (hint.whenFn && !hint.whenFn()) return false;
        return true;
      }
    };

    // QUEST
    const QUEST = {
      order: ['not_started', 'active', 'completed', 'rewarded'],
      defs: {
        MQ01: { title: '멈춘 오르골', objective: '오르골 탑을 조사하자' },
        MQ02: { title: '도레미 숲의 사라진 음표', objective: '도·미·솔 음표를 되찾자' }
      },
      state(id) {
        return DATA.quests[id]?.state || 'not_started';
      },
      setState(id, next) {
        if (!this.defs[id]) return;
        const curr = this.state(id);
        if (this.order.indexOf(next) < this.order.indexOf(curr)) {
          console.warn('퀘스트 상태 역행 무시:', id, curr, next);
          return;
        }
        DATA.quests[id] = DATA.quests[id] || { state: 'not_started', objective: this.defs[id].objective };
        DATA.quests[id].state = next;
        SAVE.write('quest');
      },
      start(id, objective) {
        if (this.state(id) === 'not_started') this.setState(id, 'active');
        if (objective) this.setObjective(id, objective);
      },
      complete(id) {
        if (this.state(id) === 'active') this.setState(id, 'completed');
      },
      reward(id) {
        if (this.state(id) === 'completed') this.setState(id, 'rewarded');
      },
      setObjective(id, objective) {
        if (!this.defs[id]) return;
        DATA.quests[id] = DATA.quests[id] || { state: this.state(id), objective: this.defs[id].objective };
        DATA.quests[id].objective = objective;
        SAVE.write('quest');
      },
      activeQuest() {
        return Object.entries(DATA.quests).find(([, q]) => q.state === 'active');
      }
    };

    // SAVE
    function defaultData() {
      return {
        version: 1,
        currentMap: 'village',
        playerPosition: { x: 0, y: 0 },
        symbols: [],
        goldenNotes: [],
        equip: null,
        quests: {
          MQ01: { state: 'not_started', objective: QUEST?.defs?.MQ01?.objective || '오르골 탑을 조사하자' },
          MQ02: { state: 'not_started', objective: '도레미 숲에서 사라진 음표를 되찾자' }
        },
        flags: {},
        codex: [],
        scoreParts: { melody: false, accidental: false, rhythm: false, dynamics: false, harmony: false },
        soundOn: true,
        hapticsOn: true,

      };

    let DATA = {
      version: 1,
      currentMap: 'village',
      playerPosition: { x: 0, y: 0 },
      symbols: [],
      goldenNotes: [],
      equip: null,
      quests: {
        MQ01: { state: 'not_started', objective: '오르골 탑을 조사하자' },
        MQ02: { state: 'not_started', objective: '도레미 숲에서 사라진 음표를 되찾자' }
      },
      flags: {},
      codex: [],
      scoreParts: { melody: false, accidental: false, rhythm: false, dynamics: false, harmony: false },
      soundOn: true,
      hapticsOn: true,
      playTime: 0
    };

    const SAVE = {
      memory: null,
      fallback: false,
      readRaw() {
        try {
          return window.localStorage.getItem(CONFIG.SAVE_KEY);
        } catch (err) {
          this.fallback = true;
          return this.memory;
        }
      },
      hasSave() {
        return Boolean(this.readRaw());
      },
      load() {
        const raw = this.readRaw();
        if (!raw) return false;
        try {
          const parsed = JSON.parse(raw);
          if (!parsed || parsed.version !== 1) return false;
          DATA = { ...defaultDataSafe(), ...parsed };
          DATA.quests = { ...defaultDataSafe().quests, ...(parsed.quests || {}) };
          DATA.flags = parsed.flags || {};
          DATA.scoreParts = { ...defaultDataSafe().scoreParts, ...(parsed.scoreParts || {}) };
          DATA.symbols = Array.isArray(parsed.symbols) ? parsed.symbols : [];
          DATA.codex = Array.isArray(parsed.codex) ? parsed.codex : [];
          DATA.goldenNotes = Array.isArray(parsed.goldenNotes) ? parsed.goldenNotes : [];
          AUDIO.muted = !DATA.soundOn;
          return true;
        } catch (err) {
          console.warn('저장 데이터가 손상되어 새로 시작합니다.');
          return false;
        }
      },
      snapshot() {
        DATA.playerPosition = { x: ENTITIES.player.x, y: ENTITIES.player.y };
        return JSON.stringify(DATA);
      },
      write(reason = 'auto') {
        if (!DATA) return;
        try {
          const payload = this.snapshot();
          window.localStorage.setItem(CONFIG.SAVE_KEY, payload);
          this.memory = payload;
        } catch (err) {
          if (!this.fallback) console.warn('localStorage 대신 인메모리 저장을 사용합니다.');
          this.fallback = true;
          this.memory = this.snapshot();
        }
        markTitleHasSave(true);
        if (['map', 'quest', 'pickup', 'puzzle', 'ending', 'new'].includes(reason)) UI.toast('저장됨 ♪', 1);
      },
      clear() {
        try {
          window.localStorage.removeItem(CONFIG.SAVE_KEY);
        } catch (err) {
        }
        this.memory = null;
        markTitleHasSave(false);
      }
    };

    function defaultDataSafe() {
      return {
        version: 1,
        currentMap: 'village',
        playerPosition: { x: 0, y: 0 },
        symbols: [],
        goldenNotes: [],
        equip: null,
        quests: {
          MQ01: { state: 'not_started', objective: '오르골 탑을 조사하자' },
          MQ02: { state: 'not_started', objective: '도레미 숲에서 사라진 음표를 되찾자' }
        },
        flags: {},
        codex: [],
        scoreParts: { melody: false, accidental: false, rhythm: false, dynamics: false, harmony: false },
        soundOn: true,
        hapticsOn: true,
        playTime: 0
      };
    }

    // UI
    const UI = {
      buttons: [],
      toastText: '',
      toastTimer: 0,
      toastDuration: 0,
      toastLog: [],
      interactTarget: null,
      lastInteractId: null,
      interactPulse: 0,
      debugTapCount: 0,
      debugTapTime: 0,
      symbolMenu: { mode: 'closed', selected: null, slot: null, filter: null },
      cutscene: null,
      codex: null,
      codexList: null,
      pauseView: 'main',
      codexDetail: null,
      logOffset: 0,
      logDrag: null,
      pressedId: null,
      resetConfirm: null,
      toast(text, time = null) {
        this.toastText = text;
        const autoTime = clamp(1.2 + Array.from(text).length * 0.04, 1.4, 3.2);
        this.toastTimer = time ?? autoTime;
        this.toastDuration = this.toastTimer;
        this.toastLog.push({ text, t: performance.now() });
        if (this.toastLog.length > 20) this.toastLog.shift();
      },
      button(id, x, y, w, h, label, enabled = true, variant = 'default') {
        this.buttons.push({ id, x, y, w, h, label, enabled, variant });
      },
      hitButton(p, id = null) {
        return [...this.buttons].reverse().find((b) => (!id || b.id === id) && b.enabled && p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h);
      },
      getInteractTarget() {
        const map = currentMap();
        if (!map) return null;
        const pc = ENTITIES.playerCenter();
        const front = {
          x: pc.x + ENTITIES.player.faceX * 28,
          y: pc.y + ENTITIES.player.faceY * 28
        };
        let best = null;
        let bestDist = 9999;
        for (const obj of map.objects) {
          if (!isObjectVisible(obj) || !this.isInteractive(obj)) continue;
          const rc = objectRect(obj);
          const oc = centerOf(rc);
          const dist = Math.min(Math.hypot(oc.x - pc.x, oc.y - pc.y), Math.hypot(oc.x - front.x, oc.y - front.y));
          if (dist < 44 && dist < bestDist) {
            best = obj;
            bestDist = dist;
          }
        }
        return best;
      },
      isInteractive(obj) {
        return ['npc', 'sign', 'pickup', 'towerDoor', 'worldScore', 'portal', 'forestGate', 'crow', 'chest', 'staffSlot', 'staffDoor', 'golden', 'rock'].includes(obj.type);
      },
      verbFor(obj) {
        if (!obj) return '!';
        const verbs = {
          npc: '말하기',
          sign: '읽기',
          pickup: '줍기',
          golden: '줍기',
          towerDoor: '열기',
          forestGate: '열기',
          staffDoor: '열기',
          chest: '열기',
          worldScore: '조사',
          crow: '듣기',
          staffSlot: '놓기',
          rock: '밀기',
          portal: '이동'
        };
        return verbs[obj.type] || '확인';
      },
      handleDebugTitleTap(p) {
        if (p.x < 104 || p.x > 256 || p.y < 146 || p.y > 184) return false;
        const now = performance.now();
        if (now - this.debugTapTime > 1200) this.debugTapCount = 0;
        this.debugTapTime = now;
        this.debugTapCount += 1;
        if (this.debugTapCount >= 5) {
          CONFIG.DEBUG = !CONFIG.DEBUG;
          this.debugTapCount = 0;
          UI.toast(CONFIG.DEBUG ? '디버그 표시 켜짐' : '디버그 표시 꺼짐');
        }
        return true;
      },
      showCodex(id) {
        const s = SYMBOLS[id];
        this.codex = { id, timer: 0 };
        setState('Cutscene');
      },
      openCodexList() {
        if (!DATA.codex.length) {
          UI.toast('아직 모은 기호가 없어요');
          return;
        }
        this.codexList = { items: DATA.codex.slice(), index: 0 };
        setState('Cutscene');
      },
      startCutscene(cards, onDone) {
        this.cutscene = { cards, index: 0, onDone };
        setState('Cutscene');
      },
      closeCutscene(skip = false) {
        if (this.codexList) {
          this.codexList = null;
          setState('Pause');
          return;
        }
        if (this.codex) {
          this.codex = null;
          setState('Explore');
          return;
        }
        if (!this.cutscene) return;
        if (!skip && this.cutscene.index < this.cutscene.cards.length - 1) {
          this.cutscene.index += 1;
          return;
        }
        const done = this.cutscene.onDone;
        this.cutscene = null;
        setState('Explore');
        if (done) done();
      },
      handleCodexListPointer(p) {
        if (!this.codexList) return false;
        const b = this.hitButton(p);
        if (b?.id === 'codexPrev') this.codexList.index = Math.max(0, this.codexList.index - 1);
        if (b?.id === 'codexNext') this.codexList.index = Math.min(this.codexList.items.length - 1, this.codexList.index + 1);
        if (b?.id === 'codexClose') this.closeCutscene();
        return Boolean(b);
      },
      openPalette(options = {}) {
        if (gameState !== 'Explore') return;
        const list = options.filter || DATA.symbols.slice();
        if (!list.length) {
          UI.toast('아직 가진 기호가 없어요');
          return;
        }
        this.symbolMenu = { mode: 'pick', selected: null, slot: options.slot || null, filter: list };
        setState('SymbolSelect');
      },
      objectAtScreenPoint(p) {
        const map = currentMap();
        if (!map) return null;
        const wp = screenToWorld(p);
        return [...map.objects].reverse().find((obj) => {
          if (!isObjectVisible(obj)) return false;
          return rectsOverlap({ x: wp.x, y: wp.y, w: 1, h: 1 }, objectRect(obj));
        }) || null;
      },
      handleSymbolPointer(p) {
        const menu = this.symbolMenu;
        const list = menu.filter || DATA.symbols;
        const x = 56;
        const y = 128;
        const w = 248;
        const h = 56;
        if (menu.mode === 'pick') {
          if (this.hitButton(p, 'closePalette')) {
            setState('Explore');
            return;
          }
          for (let i = 0; i < list.length; i += 1) {
            if (p.x >= x && p.x <= x + w && p.y >= y + i * (h + 8) && p.y <= y + i * (h + 8) + h) {
              const symbolId = list[i];
              if (menu.slot) {
                tryPlaceSlot(symbolId, menu.slot);
              } else {
                menu.mode = 'target';
                menu.selected = symbolId;
              }
              return;
            }
          }
          setState('Explore');
          return;
        }
        if (menu.mode === 'target') {
          if (this.hitButton(p, 'cancelAttach')) {
            setState('Explore');
            return;
          }
          const obj = this.objectAtScreenPoint(p);
          if (!obj) {
            setState('Explore');
            return;
          }
          tryAttachToObject(menu.selected, obj);
        }
      },
      interact() {
        const obj = this.getInteractTarget();
        if (!obj) return;
        HINT.reset();
        handleObjectInteraction(obj);
      },
      update(dt) {
        this.toastTimer = Math.max(0, this.toastTimer - dt);
        this.interactTarget = gameState === 'Explore' ? this.getInteractTarget() : null;
        const id = this.interactTarget?.id || null;
        if (id !== this.lastInteractId) {
          this.lastInteractId = id;
          this.interactPulse = id ? 0.1 : 0;
        }
        this.interactPulse = Math.max(0, this.interactPulse - dt);
      }
    };

    function handleObjectInteraction(obj) {
      if (obj.type === 'npc' || obj.type === 'sign') {
        DIALOGUE.start(resolveDialogueForObject(obj));
        return;
      }
      if (obj.type === 'pickup') {
        addSymbol(obj.symbol);
        return;
      }
      if (obj.type === 'golden') {
        DATA.flags.golden_note_01 = true;
        if (!DATA.goldenNotes.includes('golden_note_01')) DATA.goldenNotes.push('golden_note_01');
        AUDIO.sfxPickup();
        haptic(25);
        UI.toast('황금 음표를 찾았어요');
        SAVE.write('pickup');
        return;
      }
      if (obj.type === 'towerDoor') {
        if (obj.openAnim && !DATA.flags.tower_door_open) {
          UI.toast('문양이 깨어나는 중이에요');
          return;
        }
        if (DATA.flags.tower_door_open) {
          transitionToMap('tower', 'start');
          return;
        }
        if (!DATA.flags.tower_examined) {
          DIALOGUE.start('tower_mark');
        } else if (hasSymbol('clef_g')) {
          DIALOGUE.start('tower_need_clef');
        } else {
          DIALOGUE.start('clef_wait');
        }
        return;
      }
      if (obj.type === 'forestGate') {
        if (DATA.flags.forest_gate_open) transitionToMap('forest', 'fromVillage');
        else DIALOGUE.start('forest_sign_closed');
        return;
      }
      if (obj.type === 'worldScore') {
        if (!DATA.flags.world_score_seen) DIALOGUE.start('world_score_intro');
        else UI.toast('세계악보의 멜로디 파트가 아직 비어 있어요');
        return;
      }
      if (obj.type === 'portal') {
        transitionToMap(obj.to, obj.spawn);
        return;
      }
      if (obj.type === 'crow') {
        if (DATA.flags.got_note_e) DIALOGUE.start('crow_done');
        else {
          DIALOGUE.start('crow_start');
          PUZZLES.queueBirdStart = true;
        }
        return;
      }
      if (obj.type === 'chest') {
        DIALOGUE.start('chest_note_g');
        return;
      }
      if (obj.type === 'staffSlot') {
        if (obj.placed) {
          UI.toast('이미 맞는 음표가 놓였어요');
          return;
        }
        const notes = availableNotesForSlot();
        UI.openPalette({ slot: obj, filter: notes });
        return;
      }
      if (obj.type === 'staffDoor') {
        if (DATA.flags.staff_door_open) return;
        DIALOGUE.start('staff_door_closed');
        return;
      }
      if (obj.type === 'rock') {
        UI.toast('방향을 잡고 0.4초 동안 밀어보세요');
      }
    }

    // SCENES
    const SCENES = {
      camera: { x: 0, y: 0 },
      transition: { active: false, phase: 'in', alpha: 0, to: null, spawn: null },
      shake: 0,
      titleHasSave: false,
      startNewGame() {
        UI.resetConfirm = null;
        DATA = defaultDataSafe();
        DATA.soundOn = !AUDIO.muted;
        buildMaps();
        loadMap('village', 'start');
        SAVE.write('new');
        UI.startCutscene([
          '세계 멜로디아는 세계악보의 노래로 유지되었다.',
          '어느 날 하늘이 찢기고 기호들이 흩어졌다.',
          '오르골이 멈춘 아침, 견습 음악사 솔이 눈을 떴다.'
        ], () => {
          DIALOGUE.start('tempo_start');
        });
      },
      continueGame() {
        UI.resetConfirm = null;
        if (!SAVE.load()) {
          this.startNewGame();
          return;
        }
        buildMaps();
        const mapId = DATA.currentMap || 'village';
        loadMap(mapId, 'start', false);
        if (DATA.playerPosition) {
          ENTITIES.player.x = DATA.playerPosition.x || ENTITIES.player.x;
          ENTITIES.player.y = DATA.playerPosition.y || ENTITIES.player.y;
        }
        const map = currentMap();
        SCENES.camera.x = clamp(ENTITIES.player.x + CONFIG.PLAYER_W / 2 - CONFIG.W / 2, 0, Math.max(0, t2p(map.w) - CONFIG.W));
        SCENES.camera.y = clamp(ENTITIES.player.y + CONFIG.PLAYER_H / 2 - CONFIG.H / 2, 0, Math.max(0, t2p(map.h) - CONFIG.H));
        setState('Explore');
      },
      update(dt) {
        const map = currentMap();
        if (map) {
          const maxX = Math.max(0, t2p(map.w) - CONFIG.W);
          const maxY = Math.max(0, t2p(map.h) - CONFIG.H);
          const targetX = clamp(ENTITIES.player.x + CONFIG.PLAYER_W / 2 - CONFIG.W / 2, 0, maxX);
          const targetY = clamp(ENTITIES.player.y + CONFIG.PLAYER_H / 2 - CONFIG.H / 2, 0, maxY);
          this.camera.x = lerp(this.camera.x, targetX, 0.1);
          this.camera.y = lerp(this.camera.y, targetY, 0.1);
        }
        if (this.transition.active) {
          const speed = (dt / 0.3) * (CONFIG.TEST ? 4 : 1);
          if (this.transition.phase === 'out') {
            this.transition.alpha += speed;
            if (this.transition.alpha >= 1) {
              loadMap(this.transition.to, this.transition.spawn);
              this.transition.phase = 'in';
              this.transition.alpha = 1;
            }
          } else {
            this.transition.alpha -= speed;
            if (this.transition.alpha <= 0) {
              this.transition.active = false;
              this.transition.alpha = 0;
            }
          }
        }
        this.shake = CONFIG.REDUCED_MOTION ? 0 : Math.max(0, this.shake - dt);
      }
    };

    const PUZZLES = {
      queueBirdStart: false,
      bird: { active: false, playback: false, sequence: [], input: [], timer: 0, index: 0, idle: 0, shake: 0, success: 0 },
      bridge: { order: ['slot_c', 'slot_e', 'slot_g'], progress: 0, shake: 0, success: 0, hadMistake: false },
      endingDelay: 0,
      update(dt) {
        const map = currentMap();
        if (map) {
          map.objects.forEach((obj) => {
            if (obj.type === 'bell') obj.glow = Math.max(0, (obj.glow || 0) - dt);
          });
        }
        this.bird.shake = Math.max(0, this.bird.shake - dt);
        this.bird.success = Math.max(0, this.bird.success - dt);
        this.bridge.shake = Math.max(0, this.bridge.shake - dt);
        this.bridge.success = Math.max(0, this.bridge.success - dt);
        if (this.queueBirdStart && gameState === 'Explore') {
          this.queueBirdStart = false;
          this.startBird();
        }
        if (this.endingDelay > 0 && gameState === 'Explore') {
          this.endingDelay -= dt;
          if (this.endingDelay <= 0) {
            this.endingDelay = 0;
            startEnding();
          }
        }
        if (this.bird.playback) {
          this.bird.timer -= dt;
          if (this.bird.timer <= 0) {
            const note = this.bird.sequence[this.bird.index];
            AUDIO.playNote(`${note}4`, 0.38);
            const bell = currentMap()?.objects.find((obj) => obj.type === 'bell' && obj.note === note);
            if (bell) {
              bell.glow = 0.45;
              ENTITIES.addParticle(t2p(bell.x) + 16, t2p(bell.y), bell.solfege || note, CONFIG.colors.cyan);
            } else {
              ENTITIES.addParticle(t2p(17) + 16, t2p(9), note, CONFIG.colors.cyan);
            }
            this.bird.index += 1;
            this.bird.timer = 0.6;
            if (this.bird.index >= this.bird.sequence.length) {
              this.bird.playback = false;
              this.bird.index = 0;
              this.bird.timer = 0;
              this.bird.input = [];
            }
          }
        }
      },
      startBird() {
        const base = ['C', 'E', 'G'];
        for (let i = base.length - 1; i > 0; i -= 1) {
          const j = Math.floor(rng() * (i + 1));
          [base[i], base[j]] = [base[j], base[i]];
        }
        this.bird.active = true;
        this.bird.playback = true;
        this.bird.sequence = base;
        this.bird.input = [];
        this.bird.timer = 0.2;
        this.bird.index = 0;
        this.bird.idle = 0;
        this.bird.shake = 0;
        this.bird.success = 0;
        UI.toast('새의 노래를 들어보세요');
      },
      replayBird(delay = 2) {
        this.bird.playback = true;
        this.bird.input = [];
        this.bird.index = 0;
        this.bird.timer = delay;
      },
      stepBell(obj) {
        AUDIO.playNote(obj.pitch, 0.32);
        obj.glow = 0.35;
        ENTITIES.addParticle(t2p(obj.x) + 16, t2p(obj.y), obj.solfege || obj.note, CONFIG.colors.gold);
        if (!this.bird.active || this.bird.playback || DATA.flags.got_note_e) return;
        this.bird.idle = 0;
        this.bird.input.push(obj.note);
        const idx = this.bird.input.length - 1;
        if (this.bird.input[idx] !== this.bird.sequence[idx]) {
          this.bird.shake = 0.28;
          AUDIO.sfxFail();
          UI.toast('까마귀가 고개를 갸웃합니다');
          this.replayBird(2);
          return;
        }
        this.bird.success = 0.35;
        if (this.bird.input.length === this.bird.sequence.length) {
          this.bird.active = false;
          DATA.flags.got_note_e = true;
          addSymbol('note_e');
          UI.toast('미 음표를 되찾았어요');
        }
      },
      bridgeReady() {
        const map = currentMap();
        return map && map.objects.filter((obj) => obj.type === 'staffSlot').every((obj) => obj.placed);
      },
      stepBridgeSlot(obj) {
        if (!this.bridgeReady() || DATA.flags.staff_door_open) return;
        const expected = this.bridge.order[this.bridge.progress];
        const sym = obj.placedSymbol || obj.expected;
        const s = SYMBOLS[sym];
        if (s && s.pitch) {
          AUDIO.playNote(s.pitch, 0.34);
          ENTITIES.addParticle(t2p(obj.x) + 16, t2p(obj.y), s.solfege, CONFIG.colors.gold);
        }
        if (obj.id !== expected) {
          this.bridge.progress = 0;
          this.bridge.shake = 0.28;
          this.bridge.hadMistake = true;
          AUDIO.sfxFail();
          UI.toast('낮은 음부터 다시 밟아보자');
          return;
        }
        this.bridge.progress += 1;
        this.bridge.success = 0.35;
        if (this.bridge.progress >= this.bridge.order.length) this.completeBridge();
      },
      completeBridge() {
        this.bridge.progress = 0;
        this.bridge.success = 0.7;
        this.bridge.hadMistake = false;
        DATA.flags.staff_door_open = true;
        DATA.flags.part_melody = true;
        DATA.scoreParts.melody = true;
        QUEST.complete('MQ02');
        QUEST.reward('MQ02');
        AUDIO.playChord(['C4', 'E4', 'G4'], 'arp');
        haptic([30, 60, 30]);
        UI.toast('멜로디 파트 복원!');
        for (let i = 0; i < 12; i += 1) {
          ENTITIES.addParticle(t2p(31 + (i % 4)), t2p(10 + Math.floor(i / 4)), '♪', CONFIG.colors.gold);
        }
        SAVE.write('puzzle');
        this.endingDelay = 0.7;
      }
    };

    function startEnding() {
      PUZZLES.endingDelay = 0;
      DATA.flags.ending_seen = true;
      loadMap('village', 'ending');
      AUDIO.setBgm('villageMelody');
      UI.startCutscene([
        '멜로디 파트가 세계악보로 날아올랐다.',
        '들리니? 노래가 돌아오고 있어.',
        '협곡의 문이 열렸다. 여정은 계속된다...',
        'v0.1 프롤로그 완성\n도감: 높은음자리표 · 도 · 미 · 솔'
      ], () => {
        SAVE.write('ending');
        setState('Title');
      });
    }

    // SELFTEST
    const SELFTEST = {
      async run() {
        const started = performance.now();
        const results = [];
        const add = async (id, name, fn) => {
          try {
            const detail = await fn();
            const ok = detail === true || detail === undefined;
            results.push({ id, name, ok, detail: ok ? 'ok' : String(detail) });
          } catch (err) {
            results.push({ id, name, ok: false, detail: err?.message || String(err) });
          }
        };
        const allObjects = () => Object.values(MAPS).flatMap((map) => map.objects.map((obj) => ({ map, obj })));
        const dialogueKeysForObject = (obj) => {
          if (typeof obj.dialogue === 'string') return [obj.dialogue];
          if (Array.isArray(obj.dialogue)) return obj.dialogue.map((branch) => branch.use);
          return [];
        };
        const passablePath = (map, spawnName, targetIds) => {
          const spawn = map.spawns[spawnName];
          if (!spawn) return `spawn ${spawnName} 없음`;
          const spawnTile = { x: Math.floor(spawn.x), y: Math.floor(spawn.y) };
          const targets = new Set(targetIds);
          const targetCells = new Set();
          map.objects.forEach((obj) => {
            if (!targets.has(obj.id)) return;
            for (let y = obj.y - 1; y < obj.y + (obj.h || 1) + 1; y += 1) {
              for (let x = obj.x - 1; x < obj.x + (obj.w || 1) + 1; x += 1) {
                targetCells.add(`${x},${y}`);
              }
            }
          });
          if (map.id === 'forest') {
            map.objects.filter((obj) => obj.type === 'staffSlot').forEach((obj) => targetCells.add(`${obj.x},${obj.y}`));
          }
          const seen = new Set();
          const q = [spawnTile];
          const reachable = new Set();
          const walkable = (x, y) => {
            if (x < 0 || y < 0 || x >= map.w || y >= map.h) return false;
            return map.collision[y][x] === 0 || targetCells.has(`${x},${y}`);
          };
          while (q.length) {
            const cur = q.shift();
            const key = `${cur.x},${cur.y}`;
            if (seen.has(key) || !walkable(cur.x, cur.y)) continue;
            seen.add(key);
            reachable.add(key);
            [[1, 0], [-1, 0], [0, 1], [0, -1]].forEach(([dx, dy]) => q.push({ x: cur.x + dx, y: cur.y + dy }));
          }
          const missing = [];
          map.objects.forEach((obj) => {
            if (!targets.has(obj.id)) return;
            let ok = false;
            for (let y = obj.y - 1; y < obj.y + (obj.h || 1) + 1; y += 1) {
              for (let x = obj.x - 1; x < obj.x + (obj.w || 1) + 1; x += 1) {
                if (reachable.has(`${x},${y}`)) ok = true;
              }
            }
            if (!ok) missing.push(obj.id);
          });
          return missing.length ? `도달 불가: ${missing.join(', ')}` : true;
        };
        const possibleFlags = new Set([
          'pitch_hint', 'tower_examined', 'tower_door_open', 'forest_gate_open', 'staff_door_open',
          'golden_note_01', 'world_score_seen', 'ending_seen', 'part_melody'
        ]);
        Object.keys(SYMBOLS).forEach((id) => possibleFlags.add(`got_${id}`));
        ['ledger_below', 'line1', 'line2'].forEach((slot) => possibleFlags.add(`bridge_${slot}`));

        await add('ST-01', '대화 참조 무결성', () => {
          const missing = [];
          allObjects().forEach(({ map, obj }) => {
            dialogueKeysForObject(obj).forEach((key) => { if (!DIALOGUES[key]) missing.push(`${map.id}.${obj.id}:${key}`); });
          });
          return missing.length ? missing.join(', ') : true;
        });
        await add('ST-02', '대화 보상 기호 참조', () => {
          const missing = Object.entries(DIALOGUES).filter(([, d]) => d.onEnd?.addSymbol && !SYMBOLS[d.onEnd.addSymbol]).map(([key]) => key);
          return missing.length ? missing.join(', ') : true;
        });
        await add('ST-03', '오브젝트 기호 참조', () => {
          const missing = [];
          allObjects().forEach(({ map, obj }) => {
            if (obj.symbol && !SYMBOLS[obj.symbol]) missing.push(`${map.id}.${obj.id}.symbol`);
            if (obj.expected && !SYMBOLS[obj.expected]) missing.push(`${map.id}.${obj.id}.expected`);
          });
          return missing.length ? missing.join(', ') : true;
        });
        await add('ST-04', '부착 대상 참조', () => {
          const missing = [];
          allObjects().forEach(({ map, obj }) => (obj.attachTargets || []).forEach((id) => { if (!SYMBOLS[id]) missing.push(`${map.id}.${obj.id}:${id}`); }));
          return missing.length ? missing.join(', ') : true;
        });
        await add('ST-05', '포털 참조', () => {
          const missing = [];
          allObjects().forEach(({ map, obj }) => {
            if (obj.type !== 'portal') return;
            if (!MAPS[obj.to]) missing.push(`${map.id}.${obj.id}:map`);
            else if (!MAPS[obj.to].spawns[obj.spawn]) missing.push(`${map.id}.${obj.id}:spawn`);
          });
          return missing.length ? missing.join(', ') : true;
        });
        await add('ST-06', '숲 관문 트리거 위치', () => {
          const gate = MAPS.village.objects.find((obj) => obj.id === 'forest_gate');
          return gate && gate.x <= 29 && gate.x + (gate.w || 1) >= 28 && gate.y <= 11 && gate.y + (gate.h || 1) >= 10;
        });
        await add('ST-07', '스폰 타일 통행 가능', () => {
          const blocked = [];
          Object.values(MAPS).forEach((map) => Object.entries(map.spawns).forEach(([name, sp]) => {
            const tx = Math.floor(sp.x);
            const ty = Math.floor(sp.y);
            if (map.collision[ty]?.[tx] !== 0) blocked.push(`${map.id}.${name}`);
          }));
          return blocked.length ? blocked.join(', ') : true;
        });
        await add('ST-08', '맵 경계 충돌', () => {
          const bad = [];
          Object.values(MAPS).forEach((map) => {
            for (let x = 0; x < map.w; x += 1) {
              if (map.collision[0][x] !== 1 || map.collision[map.h - 1][x] !== 1) bad.push(`${map.id}.x${x}`);
            }
            for (let y = 0; y < map.h; y += 1) {
              if (map.collision[y][0] !== 1 || map.collision[y][map.w - 1] !== 1) bad.push(`${map.id}.y${y}`);
            }
          });
          return bad.length ? bad.slice(0, 8).join(', ') : true;
        });
        await add('ST-09', '마을 주요 대상 도달성', () => passablePath(MAPS.village, 'start', ['clef', 'pitch', 'well', 'clef_bush', 'tower_door', 'forest_gate']));
        await add('ST-10', '숲 주요 대상 도달성', () => passablePath(MAPS.forest, 'west', ['note_c_pickup', 'crow', 'bell_c', 'bell_e', 'bell_g', 'push_rock', 'stump_chest', 'slot_c', 'slot_e', 'slot_g', 'staff_door', 'golden_note_01', 'waterfall_sign']));
        await add('ST-11', '음 높이 공식', () => (
          AUDIO.noteToMidi('C4') === 60 && AUDIO.noteToMidi('A4') === 69 &&
          Math.abs(AUDIO.noteToFreq('A4') - 440) < 0.001 &&
          Math.abs(AUDIO.noteToFreq('C4') - 261.6256) < 0.01
        ));
        await add('ST-12', '오선 위치 매핑', () => (
          SYMBOLS.note_c.staffSlot === 'ledger_below' && SYMBOLS.note_c.pitch === 'C4' &&
          SYMBOLS.note_e.staffSlot === 'line1' && SYMBOLS.note_e.pitch === 'E4' &&
          SYMBOLS.note_g.staffSlot === 'line2' && SYMBOLS.note_g.pitch === 'G4'
        ));
        await add('ST-13', '브릿지 순서', () => {
          const orderOk = JSON.stringify(PUZZLES.bridge.order) === JSON.stringify(['slot_c', 'slot_e', 'slot_g']);
          const slots = PUZZLES.bridge.order.map((id) => MAPS.forest.objects.find((obj) => obj.id === id));
          const midis = slots.map((slot) => AUDIO.noteToMidi(SYMBOLS[slot.expected].pitch));
          return orderOk && midis[0] < midis[1] && midis[1] < midis[2];
        });
        await add('ST-14', '슬롯 기대값 일치', () => {
          const bad = MAPS.forest.objects.filter((obj) => obj.type === 'staffSlot' && SYMBOLS[obj.expected]?.staffSlot !== obj.staffSlot).map((obj) => obj.id);
          return bad.length ? bad.join(', ') : true;
        });
        await add('ST-15', '퀘스트 기본 구조', () => {
          const defKeys = Object.keys(QUEST.defs).sort().join(',');
          const dataKeys = Object.keys(defaultData().quests).sort().join(',');
          const safeKeys = Object.keys(defaultDataSafe().quests).sort().join(',');
          return defKeys === dataKeys && dataKeys === safeKeys;
        });
        await add('ST-16', '기본 데이터 동등성', () => JSON.stringify(defaultData()) === JSON.stringify(defaultDataSafe()));
        await add('ST-17', '저장 스냅샷 구조', () => {
          const parsed = JSON.parse(SAVE.snapshot());
          const required = ['version', 'currentMap', 'symbols', 'quests', 'flags', 'scoreParts', 'codex', 'goldenNotes'];
          const missing = required.filter((key) => !(key in parsed));
          return missing.length ? missing.join(', ') : true;
        });
        await add('ST-18', '상태 목록', () => CONFIG.states.includes('TimelineEdit') && CONFIG.states.includes('Puzzle') && CONFIG.states.includes('Pause'));
        await add('ST-19', '이미지 에셋 로드', () => Promise.all(Object.values(CONFIG.assets).map((src) => new Promise((resolve) => {
          const img = new Image();
          const timer = setTimeout(() => resolve(src), 5000);
          img.onload = () => { clearTimeout(timer); resolve(null); };
          img.onerror = () => { clearTimeout(timer); resolve(src); };
          img.src = src;
        }))).then((failed) => {
          const bad = failed.filter(Boolean);
          return bad.length ? bad.join(', ') : true;
        }));
        await add('ST-20', '대사 라인 문자열', () => {
          const bad = Object.entries(DIALOGUES).filter(([, d]) => !Array.isArray(d.lines) || d.lines.some((line) => typeof line !== 'string' || !line.trim())).map(([key]) => key);
          return bad.length ? bad.join(', ') : true;
        });
        await add('ST-21', 'flag 참조 화이트리스트', () => {
          const bad = [];
          allObjects().forEach(({ map, obj }) => {
            if (obj.hideIfFlag && !possibleFlags.has(obj.hideIfFlag)) bad.push(`${map.id}.${obj.id}:${obj.hideIfFlag}`);
            (obj.requiresFlags || []).forEach((flag) => { if (!possibleFlags.has(flag)) bad.push(`${map.id}.${obj.id}:${flag}`); });
          });
          return bad.length ? bad.join(', ') : true;
        });
        await add('ST-22', '상호작용 타입 분기', () => {
          const expected = ['npc', 'sign', 'pickup', 'towerDoor', 'worldScore', 'portal', 'forestGate', 'crow', 'chest', 'staffSlot', 'staffDoor', 'golden', 'rock'];
          const bad = expected.filter((type) => !UI.isInteractive({ type }));
          return bad.length ? bad.join(', ') : true;
        });

        const fail = results.filter((r) => !r.ok).length;
        const payload = { done: true, pass: results.length - fail, fail, ms: Math.round(performance.now() - started), results };
        window.__MELODIA_SELFTEST__ = payload;
        console.table(results);
        return payload;
      }
    };

    // RENDER
    function drawRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function fillTextWrapped(text, x, y, maxW, lineH, maxLines = 5) {
      const oldAlign = ctx.textAlign;
      ctx.textAlign = 'left';
      const chars = Array.from(text);
      let line = '';
      let count = 0;
      for (let i = 0; i < chars.length; i += 1) {
        if (chars[i] === '\n') {
          ctx.fillText(line, x, y + count * lineH);
          line = '';
          count += 1;
          continue;
        }
        const test = line + chars[i];
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, x, y + count * lineH);
          line = chars[i];
          count += 1;
          if (count >= maxLines) {
            ctx.textAlign = oldAlign;
            return;
          }
        } else {
          line = test;
        }
      }
      if (line && count < maxLines) ctx.fillText(line, x, y + count * lineH);
      ctx.textAlign = oldAlign;
    }

    function render() {
      UI.buttons = [];
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, CONFIG.W, CONFIG.H);
      if (gameState === 'Boot') {
        drawBoot();
        drawSelfTestBadge();
        return;
      }
      if (gameState === 'Title') {
        drawTitle();
        drawToast();
        drawSelfTestBadge();
        return;
      }
      drawWorld();
      drawHud();
      drawPuzzleFeedback();

      if (gameState === 'Pause') drawPause();

        ctx.fillStyle = `rgba(0,0,0,${SCENES.transition.alpha})`;
