    function drawButton(b) {
      if (!b) return;
      ctx.save();
      const pressed = UI.pressedId === b.id;
      const scale = pressed ? 0.96 : 1;
      const x = b.x + b.w * (1 - scale) / 2;
      const y = b.y + b.h * (1 - scale) / 2;
      const w = b.w * scale;
      const h = b.h * scale;
      ctx.globalAlpha = b.enabled && b.variant !== 'disabled' ? 1 : 0.45;
      if (pressed) ctx.globalAlpha *= 0.92;
      ctx.fillStyle = b.variant === 'danger' ? CONFIG.colors.danger : (b.id === 'new' ? '#3F8E64' : '#FFFDF6');
      ctx.strokeStyle = '#3F332B';
      ctx.lineWidth = 2;
      drawRoundRect(x, y, w, h, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = (b.id === 'new' || b.variant === 'danger') ? '#FFFDF6' : '#3F332B';
      ctx.font = '800 18px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.x + b.w / 2, b.y + 35);
      ctx.restore();
    }

    function drawConfirmPanel(message, confirmId, cancelId, confirmLabel, cancelLabel) {
      ctx.fillStyle = 'rgba(0,0,0,.46)';
      ctx.fillRect(0, 0, CONFIG.W, CONFIG.H);
      ctx.fillStyle = CONFIG.colors.panel;
      drawRoundRect(38, 222, 284, 196, 8);
      ctx.fill();
      ctx.strokeStyle = '#3F332B';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = CONFIG.colors.text;
      ctx.font = '900 19px system-ui';
      ctx.textAlign = 'left';
      fillTextWrapped(message, 62, 264, 236, 27, 3);
      UI.button(confirmId, 62, 336, 108, 48, confirmLabel, true, 'danger');
      UI.button(cancelId, 190, 336, 108, 48, cancelLabel);
      drawButton(UI.buttons.find((b) => b.id === confirmId));
      drawButton(UI.buttons.find((b) => b.id === cancelId));
    }

    function drawWorld() {
      const map = currentMap();
      if (!map) return;
      const pal = CONFIG.palettes[map.palette];
      ctx.save();
      let sx = -SCENES.camera.x;
      let sy = -SCENES.camera.y;
      if (!CONFIG.REDUCED_MOTION && SCENES.shake > 0) {
        sx += Math.sin(performance.now() * 0.04) * 3;
        sy += Math.cos(performance.now() * 0.036) * 2;
      }
      ctx.translate(Math.round(sx), Math.round(sy));
      const startX = clamp(Math.floor(SCENES.camera.x / CONFIG.TILE) - 1, 0, map.w - 1);
      const startY = clamp(Math.floor(SCENES.camera.y / CONFIG.TILE) - 1, 0, map.h - 1);
      const endX = clamp(startX + Math.ceil(CONFIG.W / CONFIG.TILE) + 3, 0, map.w);
      const endY = clamp(startY + Math.ceil(CONFIG.H / CONFIG.TILE) + 3, 0, map.h);
      for (let y = startY; y < endY; y += 1) {
        for (let x = startX; x < endX; x += 1) {
          drawTile(x, y, tileAt(map, x, y), pal);
        }
      }
      drawMapDetails(map);
      const drawables = [];
      map.objects.forEach((obj) => {
        if (isObjectVisible(obj)) drawables.push({ y: t2p(obj.y + (obj.h || 1)), obj });
      });
      drawables.push({ y: ENTITIES.player.y + CONFIG.PLAYER_H, player: true });
      drawables.sort((a, b) => a.y - b.y);
      drawables.forEach((item) => item.player ? drawPlayer() : drawObject(item.obj));
      map.above.forEach((a) => {
        ctx.fillStyle = a.color;
        ctx.globalAlpha = 0.82;
        drawRoundRect(t2p(a.x), t2p(a.y), t2p(a.w), t2p(a.h), 8);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      ENTITIES.particles.forEach((p) => {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        if (p.kind === 'dot') {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r || 3, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.font = '800 18px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText(p.text, p.x, p.y);
        }
        ctx.globalAlpha = 1;
      });
      ctx.restore();
    }

    function drawTile(x, y, tile, pal) {
      const px = t2p(x);
      const py = t2p(y);
      if (tile === 0) ctx.fillStyle = (x + y) % 2 ? pal.ground : pal.alt;
      if (tile === 1 || tile === 2) ctx.fillStyle = pal.road;
      if (tile === 3) ctx.fillStyle = CONFIG.colors.water;
      if (tile === 4) ctx.fillStyle = '#E8F4FF';
      if (tile === 5) ctx.fillStyle = '#F5E6C8';
      ctx.fillRect(px, py, CONFIG.TILE, CONFIG.TILE);
      if (tile === 3) {
        ctx.strokeStyle = 'rgba(255,255,255,.28)';
        ctx.beginPath();
        ctx.moveTo(px + 4, py + 20);
        ctx.quadraticCurveTo(px + 16, py + 12, px + 28, py + 20);
        ctx.stroke();
      }
    }

    function drawMapDetails(map) {
      if (map.id === 'village') {
        drawStaff(t2p(14), t2p(1.4), 128, 9, 'rgba(93,64,55,.22)');
      }
      if (map.id === 'forest') {
        drawStaff(t2p(26.5), t2p(10.1), 112, 7, 'rgba(255,255,255,.75)');
      }
    }

    function drawStaff(x, y, w, gap, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i += 1) {
        ctx.beginPath();
        ctx.moveTo(x, y + i * gap);
        ctx.lineTo(x + w, y + i * gap);
        ctx.stroke();
      }
    }

    function drawSparkles(cx, cy) {
      if (CONFIG.REDUCED_MOTION) return;
      const t = (performance.now() * 0.001) % 1.2 / 1.2;
      const dist = 8 + t * 8;
      const alpha = 1 - t;
      ctx.save();
      ctx.fillStyle = `rgba(255,213,79,${alpha})`;
      [[1, 0], [-1, 0], [0, 1], [0, -1]].forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.arc(cx + dx * dist, cy + dy * dist, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawObject(obj) {
      const r = objectRect(obj);
      const cx = r.x + r.w / 2;
      const cy = r.y + r.h / 2;
      if (obj.type === 'decor') {
        ctx.fillStyle = CONFIG.colors.villageWood;
        drawRoundRect(r.x, r.y, r.w, r.h, 6);
        ctx.fill();
        ctx.fillStyle = CONFIG.colors.gold;
        ctx.font = '24px serif';
        ctx.textAlign = 'center';
        ctx.fillText('♪', cx, r.y + 30);
        return;
      }
      if (obj.type === 'towerDoor') {
        const progress = obj.openAnim ? clamp(obj.openAnim / 0.9, 0, 1) : (DATA.flags.tower_door_open ? 1 : 0);
        ctx.fillStyle = DATA.flags.tower_door_open ? '#B6E3A8' : '#6D4C41';
        drawRoundRect(r.x, r.y, r.w, r.h, 4);
        ctx.fill();
        if (progress > 0) {
          const lines = Math.max(1, Math.ceil(progress * 5));
          ctx.strokeStyle = CONFIG.colors.gold;
          ctx.lineWidth = 2;
          for (let i = 0; i < lines; i += 1) {
            ctx.beginPath();
            ctx.moveTo(r.x + 4, r.y + 6 + i * 4);
            ctx.lineTo(r.x + r.w - 4, r.y + 6 + i * 4);
            ctx.stroke();
          }
        }
        return;
      }
      if (obj.type === 'npc') {
        ctx.fillStyle = obj.role === 'child' ? '#FDD835' : (obj.role === 'bard' ? '#AB47BC' : CONFIG.colors.green);
        drawRoundRect(r.x + 4, r.y + 6, 24, 24, 8);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '700 10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(obj.label.slice(0, 2), cx, cy + 5);
      } else if (obj.type === 'pickup') {
        const s = SYMBOLS[obj.symbol];
        ctx.fillStyle = CONFIG.colors.gold;
        ctx.beginPath();
        ctx.arc(cx, cy, 12 + (CONFIG.REDUCED_MOTION ? 0 : Math.sin(performance.now() * 0.006) * 2), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = CONFIG.colors.text;
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.fillText(s.glyph, cx, cy + 8);
        drawSparkles(cx, cy);
      } else if (obj.type === 'golden') {
        ctx.fillStyle = CONFIG.colors.gold;
        ctx.font = '30px serif';
        ctx.textAlign = 'center';
        ctx.fillText('♪', cx, cy + 10);
        drawSparkles(cx, cy);
      } else if (obj.type === 'forestGate') {
        ctx.fillStyle = DATA.flags.forest_gate_open ? '#79C879' : '#5D4037';
        drawRoundRect(r.x, r.y, r.w, r.h, 4);
        ctx.fill();
        ctx.fillStyle = CONFIG.colors.gold;
        ctx.font = '22px serif';
        ctx.textAlign = 'center';
        ctx.fillText(DATA.flags.forest_gate_open ? '𝄋' : '×', cx, cy + 8);
      } else if (obj.type === 'sign') {
        ctx.fillStyle = '#8D6E63';
        ctx.fillRect(r.x + 8, r.y + 12, 16, 16);
        ctx.fillStyle = '#5D4037';
        ctx.fillRect(r.x + 14, r.y + 24, 4, 12);
      } else if (obj.type === 'worldScore') {
        ctx.fillStyle = '#FFFDF6';
        drawRoundRect(r.x, r.y, r.w, r.h, 6);
        ctx.fill();
        drawStaff(r.x + 10, r.y + 14, r.w - 20, 6, '#6D4C41');
        ctx.strokeStyle = CONFIG.colors.danger;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(r.x + 28, r.y + 8);
        ctx.lineTo(r.x + r.w - 18, r.y + r.h - 10);
        ctx.stroke();
      } else if (obj.type === 'portal') {
        ctx.fillStyle = 'rgba(77,208,225,.35)';
        ctx.fillRect(r.x, r.y, r.w, r.h);
      } else if (obj.type === 'crow') {
        ctx.fillStyle = '#5B4037';
        ctx.fillRect(r.x + 13, r.y + 8, 8, 24);
        ctx.fillStyle = '#2F7D46';
        ctx.beginPath();
        ctx.arc(cx, cy - 6, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#202026';
        ctx.font = '18px serif';
        ctx.textAlign = 'center';
        ctx.fillText(DATA.flags.got_note_e ? '♪' : '까', cx, cy - 2);
      } else if (obj.type === 'bell') {
        const glow = obj.glow || 0;
        if (glow > 0) {
          ctx.fillStyle = `rgba(255,213,79,${clamp(glow * 1.8, 0, 0.72)})`;
          ctx.beginPath();
          ctx.arc(cx, cy, 18 + glow * 12, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = glow > 0 ? '#FFD96A' : '#F4B942';
        ctx.beginPath();
        ctx.moveTo(cx, r.y + 6);
        ctx.lineTo(r.x + 8, r.y + 26);
        ctx.lineTo(r.x + 24, r.y + 26);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#4A342A';
        ctx.font = '700 11px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(obj.solfege || obj.note, cx, r.y + 23);
      } else if (obj.type === 'rock') {
        ctx.fillStyle = '#757575';
        drawRoundRect(r.x + 2, r.y + 4, 28, 24, 8);
        ctx.fill();
      } else if (obj.type === 'chest') {
        ctx.fillStyle = '#8D6E63';
        drawRoundRect(r.x + 3, r.y + 9, 26, 18, 4);
        ctx.fill();
        ctx.fillStyle = CONFIG.colors.gold;
        ctx.fillRect(r.x + 14, r.y + 16, 4, 5);
      } else if (obj.type === 'staffSlot') {
        ctx.fillStyle = obj.placed ? 'rgba(255,213,79,.95)' : 'rgba(255,255,255,.6)';
        ctx.strokeStyle = obj.placed ? CONFIG.colors.gold : CONFIG.colors.cyan;
        ctx.lineWidth = 2;
        drawRoundRect(r.x + 2, r.y + 4, 28, 24, 4);
        ctx.fill();
        ctx.stroke();
        if (obj.placedSymbol) {
          const s = SYMBOLS[obj.placedSymbol];
          ctx.fillStyle = CONFIG.colors.text;
          ctx.font = '20px serif';
          ctx.textAlign = 'center';
          ctx.fillText(s.glyph, cx, cy + 7);
        }
      } else if (obj.type === 'staffDoor') {
        ctx.fillStyle = DATA.flags.staff_door_open ? '#B6E3A8' : '#315B43';
        drawRoundRect(r.x, r.y, r.w, r.h, 5);
        ctx.fill();
        ctx.fillStyle = CONFIG.colors.gold;
        ctx.font = '18px serif';
        ctx.textAlign = 'center';
        ctx.fillText(DATA.flags.staff_door_open ? '열림' : '𝄞', cx, cy + 5);
      }
      if (UI.interactTarget === obj && gameState === 'Explore') {
        if (obj.label) {
          ctx.font = '800 10px system-ui';
          const labelW = clamp(ctx.measureText(obj.label).width + 16, 34, 96);
          let labelY = r.y - 30;
          if (labelY - SCENES.camera.y < 64) labelY = r.y + r.h + 8;
          ctx.fillStyle = 'rgba(32,32,38,.64)';
          drawRoundRect(cx - labelW / 2, labelY, labelW, 18, 6);
          ctx.fill();
          ctx.fillStyle = '#FFFDF6';
          ctx.textAlign = 'center';
          ctx.fillText(obj.label, cx, labelY + 13);
        }
        ctx.fillStyle = CONFIG.colors.cyan;
        ctx.font = '800 18px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('!', cx, r.y - 4);
      }
    }

    function drawAttachHighlights() {
      const selected = UI.symbolMenu.selected;
      const map = currentMap();
      if (!selected || !map) return;
      const targets = map.objects.filter((obj) => isObjectVisible(obj) && obj.attachTargets && obj.attachTargets.includes(selected));
      const pulse = CONFIG.REDUCED_MOTION ? 0.8 : 0.65 + Math.sin(performance.now() * 0.008) * 0.25;
      ctx.save();
      ctx.translate(-Math.round(SCENES.camera.x), -Math.round(SCENES.camera.y));
      targets.forEach((obj) => {
        const r = objectRect(obj);
        ctx.strokeStyle = CONFIG.colors.cyan;
        ctx.lineWidth = 3;
        ctx.globalAlpha = pulse;
        ctx.strokeRect(r.x - 4, r.y - 4, r.w + 8, r.h + 8);
        ctx.fillStyle = CONFIG.colors.cyan;
        ctx.beginPath();
        ctx.moveTo(r.x + r.w / 2, r.y - 16);
        ctx.lineTo(r.x + r.w / 2 - 8, r.y - 4);
        ctx.lineTo(r.x + r.w / 2 + 8, r.y - 4);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      ctx.restore();
      targets.forEach((obj) => {
        const r = objectRect(obj);
        const sx = r.x + r.w / 2 - SCENES.camera.x;
        const sy = r.y + r.h / 2 - SCENES.camera.y;
        if (sx >= 18 && sx <= CONFIG.W - 18 && sy >= 68 && sy <= CONFIG.H - 18) return;
        const px = clamp(sx, 22, CONFIG.W - 22);
        const py = clamp(sy, 76, CONFIG.H - 26);
        const angle = Math.atan2(sy - CONFIG.H / 2, sx - CONFIG.W / 2);
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(angle);
        ctx.fillStyle = CONFIG.colors.cyan;
        ctx.globalAlpha = pulse;
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(-7, -8);
        ctx.lineTo(-7, 8);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
    }

    function drawPlayer() {
      const p = ENTITIES.player;
      const bob = p.moving && !CONFIG.REDUCED_MOTION ? Math.sin(performance.now() * 0.014) * 1.5 : 0;
      const tilt = p.moving && !CONFIG.REDUCED_MOTION ? (p.faceX || Math.sin(performance.now() * 0.012)) * 0.04 : 0;
      ctx.save();
      ctx.translate(p.x + CONFIG.PLAYER_W / 2, p.y + CONFIG.PLAYER_H / 2 + bob);
      ctx.rotate(tilt);
      ctx.fillStyle = CONFIG.colors.blue;
      drawRoundRect(-CONFIG.PLAYER_W / 2, -CONFIG.PLAYER_H / 2, CONFIG.PLAYER_W, CONFIG.PLAYER_H, 6);
      ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      const fx = p.faceX * 5;
      const fy = -CONFIG.PLAYER_H / 2 + 8 + p.faceY * 4;
      ctx.beginPath();
      ctx.arc(fx, fy, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

      ctx.textAlign = 'center';

      if (!DATA.soundOn) {

        ctx.lineWidth = 2;

      ctx.fillStyle = CONFIG.colors.text;

      const enabled = Boolean(UI.interactTarget);

      ctx.globalAlpha = enabled ? 1 : 0.38;

        ctx.fillStyle = 'rgba(32,32,38,.58)';

      UI.button('palette', 280, 570, 64, 54, '♪', DATA.symbols.length > 0);
      ctx.globalAlpha = DATA.symbols.length ? 1 : 0.38;
      ctx.fillStyle = CONFIG.colors.gold;
      drawRoundRect(280, 570, 64, 54, 8);
      ctx.fill();
      ctx.fillStyle = '#3F332B';
      ctx.font = '900 27px serif';
      ctx.fillText('♪', 312, 606);
      ctx.globalAlpha = 1;

      if (INPUT.joy.active) drawJoystick();
      if (CONFIG.DEBUG) {
        ctx.fillStyle = 'rgba(32,32,38,.62)';

        ctx.textAlign = 'left';

    function drawPuzzleFeedback() {
      if (gameState !== 'Explore' || DATA.currentMap !== 'forest') return;
      let y = 64;
      const drawPipRow = (x, rowY, total, activeCount, playIndex = -1, labels = []) => {
        for (let i = 0; i < total; i += 1) {
          const cx = x + i * 25;
          ctx.fillStyle = i < activeCount ? CONFIG.colors.gold : 'rgba(255,255,255,.62)';

    // MAIN
    function update(dt) {
      if (['Explore', 'Dialogue', 'SymbolSelect', 'Cutscene'].includes(gameState)) DATA.playTime += dt;
      AUDIO.update(dt);
      RHYTHM.update(dt);
      DIALOGUE.update(dt);
      SCENES.update(dt);
      ENTITIES.update(dt);
      PUZZLES.update(dt);
      HINT.update(dt);
      UI.update(dt);
      if (gameState === 'Title') {
        AUDIO.setBgm('title');
      } else if (gameState === 'Explore' && DATA.currentMap === 'village') {
        AUDIO.setBgm(DATA.scoreParts.melody ? 'villageMelody' : 'villageQuiet');
      }
      if (gameState === 'Explore') {
        positionSaveTimer += dt;
        if (positionSaveTimer >= 2) {
          positionSaveTimer = 0;
          SAVE.write('position');
        }
      }
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      let delta = Math.min(0.1, (ts - lastTime) / 1000);
      lastTime = ts;
      accumulator += delta;
      fpsClock += delta;
      frameCount += 1;
      if (fpsClock >= 0.5) {
        fps = frameCount / fpsClock;
        fpsClock = 0;
        frameCount = 0;
      }
      const fixed = 1 / 60;
      while (accumulator >= fixed) {
        update(fixed);
        accumulator -= fixed;
      }
      render();
      requestAnimationFrame(loop);
    }

    function shouldDeferButton(b) {
      if (!b) return false;
      if (gameState === 'Explore') return b.id === 'pause' || b.id === 'soundHud';
      if (gameState === 'Dialogue') return false;
      if (gameState === 'Cutscene') return ['skip', 'codexPrev', 'codexNext', 'codexClose'].includes(b.id);
      if (gameState === 'SymbolSelect') return ['closePalette', 'cancelAttach'].includes(b.id);
      if (gameState === 'Title' || gameState === 'Pause') return true;
      return false;
    }

    function executeButton(id) {
      const lowTick = id.includes('cancel') || id.includes('Close') || id === 'pauseBack' || id === 'closePalette' || id === 'cancelAttach';
      AUDIO.sfxTick(lowTick);
      haptic(10);
      if (gameState === 'Explore') {
        if (id === 'pause') {
          UI.pauseView = 'main';
          setState('Pause');
        }
        if (id === 'soundHud') {
          AUDIO.setMuted(DATA.soundOn);
          if (DATA.soundOn) AUDIO.sfxTick();
        }
        return;
      }
      if (gameState === 'Title') {
        if (UI.resetConfirm?.type === 'new') {
          if (id === 'confirmNew') SCENES.startNewGame();
          if (id === 'cancelNew') UI.resetConfirm = null;
          return;
        }
        if (id === 'new') {
          if (SCENES.titleHasSave) UI.resetConfirm = { type: 'new' };
          else SCENES.startNewGame();
        }
        if (id === 'continue') SCENES.continueGame();
        if (id === 'sound') AUDIO.setMuted(DATA.soundOn);
        return;
      }
      if (gameState === 'Cutscene') {
        if (UI.codexList) {
          if (id === 'codexPrev') UI.codexList.index = Math.max(0, UI.codexList.index - 1);
          if (id === 'codexNext') UI.codexList.index = Math.min(UI.codexList.items.length - 1, UI.codexList.index + 1);
          if (id === 'codexClose') UI.closeCutscene();
          return;
        }
        if (id === 'skip') UI.closeCutscene(true);
        return;
      }
      if (gameState === 'SymbolSelect') {
        if (id === 'closePalette' || id === 'cancelAttach') setState('Explore');
        return;
      }
      if (gameState === 'Pause') {
        if (UI.resetConfirm?.type === 'clear') {
          if (id === 'confirmClear') {
            SAVE.clear();
            DATA = defaultDataSafe();
            DATA.soundOn = !AUDIO.muted;
            buildMaps();
            loadMap('village', 'start', false);
            UI.resetConfirm = null;
            UI.pauseView = 'main';
            UI.toast('저장이 초기화되었습니다');
            setState('Title');
          }
          if (id === 'cancelClear') UI.resetConfirm = null;
          return;
        }
        if (id === 'pauseBack') {
          UI.pauseView = 'main';
          UI.codexDetail = null;
          return;
        }
        if (id === 'codexDetailClose') {
          UI.codexDetail = null;
          return;
        }
        if (id.startsWith('codexCard_')) {
          UI.codexDetail = id.replace('codexCard_', '');
          return;
        }
        if (id === 'resume') setState('Explore');
        if (id === 'toggleSound') AUDIO.setMuted(DATA.soundOn);
        if (id === 'toggleHaptics') {
          DATA.hapticsOn = !DATA.hapticsOn;
          SAVE.write('settings');
          UI.toast(DATA.hapticsOn ? '진동 켜짐' : '진동 꺼짐');
        }
        if (id === 'title') {
          UI.resetConfirm = null;
          setState('Title');
        }
        if (id === 'codexList') {
          if (!DATA.codex.length) UI.toast('아직 모은 기호가 없어요');
          else {
            UI.pauseView = 'codex';
            UI.codexDetail = null;
          }
        }
        if (id === 'dialogueLog') {
          if (!DIALOGUE.log.length) UI.toast('아직 나눈 대화가 없어요');
          else {
            UI.pauseView = 'log';
            UI.logOffset = 0;
          }
        }
        if (id === 'saveManage') UI.pauseView = 'save';
        if (id === 'resetSave') UI.resetConfirm = { type: 'clear' };
      }
    }

    function pointerDown(e) {
      e.preventDefault();
      AUDIO.unlock();
      AUDIO.resume();
      const p = screenToGame(e);
      canvas.setPointerCapture?.(e.pointerId);
      const pressed = UI.hitButton(p);
      if (shouldDeferButton(pressed)) {
        UI.pressedId = pressed.id;
        return;
      }
      if (gameState === 'Title') {
        if (UI.resetConfirm?.type === 'new') {
          const b = UI.hitButton(p);
          if (b?.id === 'confirmNew') SCENES.startNewGame();
          if (b?.id === 'cancelNew') UI.resetConfirm = null;
          return;
        }
        const b = UI.hitButton(p);
        if (b?.id === 'new') {
          if (SCENES.titleHasSave) UI.resetConfirm = { type: 'new' };
          else SCENES.startNewGame();
        }
        if (b?.id === 'continue') SCENES.continueGame();
        if (b?.id === 'sound') AUDIO.setMuted(DATA.soundOn);
        return;
      }
      if (gameState === 'Dialogue') {
        DIALOGUE.advance();
        return;
      }
      if (gameState === 'Cutscene') {
        if (UI.codexList) {
          if (!UI.handleCodexListPointer(p)) UI.closeCutscene();
          return;
        }
        const b = UI.hitButton(p, 'skip');
        UI.closeCutscene(Boolean(b));
        return;
      }
      if (gameState === 'SymbolSelect') {
        UI.handleSymbolPointer(p);
        return;
      }
      if (gameState === 'Pause') {
        if (UI.handleDebugTitleTap(p)) return;
        if (UI.resetConfirm?.type === 'clear') {
          const b = UI.hitButton(p);
          if (b?.id === 'confirmClear') {
            SAVE.clear();
            DATA = defaultDataSafe();
            DATA.soundOn = !AUDIO.muted;
            buildMaps();
            loadMap('village', 'start', false);
            UI.resetConfirm = null;
            UI.toast('저장이 초기화되었습니다');
            setState('Title');
          }
          if (b?.id === 'cancelClear') UI.resetConfirm = null;
          return;
        }
        const b = UI.hitButton(p);
        if (b?.id === 'pauseBack') {
          UI.pauseView = 'main';
          UI.codexDetail = null;
          return;
        }
        if (b?.id === 'codexDetailClose') {
          UI.codexDetail = null;
          return;
        }
        if (b?.id?.startsWith('codexCard_')) {
          UI.codexDetail = b.id.replace('codexCard_', '');
          return;
        }
        if (UI.pauseView === 'log' && !b) {
          UI.logDrag = { y: p.y, offset: UI.logOffset };
          return;
        }
        if (b?.id === 'resume') setState('Explore');
        if (b?.id === 'toggleSound') {
          AUDIO.setMuted(DATA.soundOn);
          if (DATA.soundOn) AUDIO.sfxTick();
          haptic(10);
        }
        if (b?.id === 'toggleHaptics') {
          DATA.hapticsOn = !DATA.hapticsOn;
          SAVE.write('settings');
          UI.toast(DATA.hapticsOn ? '진동 켜짐' : '진동 꺼짐');
          haptic(10);
        }
        if (b?.id === 'title') {
          UI.resetConfirm = null;
          setState('Title');
        }
        if (b?.id === 'codexList') {
          if (!DATA.codex.length) UI.toast('아직 모은 기호가 없어요');
          else {
            UI.pauseView = 'codex';
            UI.codexDetail = null;
          }
        }
        if (b?.id === 'dialogueLog') {
          if (!DIALOGUE.log.length) UI.toast('아직 나눈 대화가 없어요');
          else {
            UI.pauseView = 'log';
            UI.logOffset = 0;
          }
        }
        if (b?.id === 'saveManage') UI.pauseView = 'save';
        if (b?.id === 'resetSave') UI.resetConfirm = { type: 'clear' };
        return;
      }
      if (gameState === 'Explore') {
        const b = UI.hitButton(p);
        if (b?.id === 'pause') {
          UI.pauseView = 'main';
          setState('Pause');
          return;
        }
        if (b?.id === 'soundHud') {
          AUDIO.setMuted(DATA.soundOn);
          if (DATA.soundOn) AUDIO.sfxTick();
          haptic(10);
          return;
        }
        if (b?.id === 'interact') {
          UI.interact();
          return;
        }
        if (b?.id === 'palette') {
          UI.openPalette();
          return;
        }
        INPUT.down(p, e.pointerId);
      }
    }

    function pointerMove(e) {
      const p = screenToGame(e);
      if (gameState === 'Pause' && UI.pauseView === 'log' && UI.logDrag) {
        UI.logOffset = Math.max(0, UI.logDrag.offset - (p.y - UI.logDrag.y));
        return;
      }
      INPUT.move(p, e.pointerId);
    }

    function pointerUp(e) {
      const p = screenToGame(e);
      if (UI.pressedId) {
        const id = UI.pressedId;
        UI.pressedId = null;
        if (UI.hitButton(p, id)) executeButton(id);
        UI.logDrag = null;
        INPUT.up(e.pointerId);
        return;
      }
      UI.logDrag = null;
      INPUT.up(e.pointerId);
    }

    function keyDown(e) {
      AUDIO.unlock();
      AUDIO.resume();
      INPUT.keys.add(e.code);
      if (e.code === 'KeyE' && gameState === 'Explore') UI.interact();
      if (e.code === 'KeyQ' && gameState === 'Explore') UI.openPalette();
      if (e.code === 'Escape') {
        if (gameState === 'Explore') {
          UI.pauseView = 'main';
          setState('Pause');
        }
        else if (gameState === 'Pause') {
          if (UI.pauseView !== 'main') {
            UI.pauseView = 'main';
            UI.codexDetail = null;
            UI.resetConfirm = null;
          } else {
            setState('Explore');
          }
        }
        else if (gameState === 'Cutscene' && UI.codexList) UI.closeCutscene();
        else if (gameState === 'SymbolSelect') setState('Explore');
      }
      if ((gameState === 'Dialogue' || gameState === 'Cutscene') && (e.code === 'Space' || e.code === 'Enter')) {
        if (gameState === 'Dialogue') DIALOGUE.advance();
        else UI.closeCutscene(false);
      }
    }

    function keyUp(e) {
      INPUT.keys.delete(e.code);
    }

    function clearHeldInput() {
      INPUT.keys.clear();
      INPUT.clearMovement();
    }

    function saveBackgroundProgress() {
      if (gameState !== 'Boot' && gameState !== 'Title') SAVE.write('background');
    }

    function handleVisibilityChange() {
      if (document.hidden) {
        saveBackgroundProgress();
        try {
          AUDIO.ctx?.suspend?.();
        } catch (err) {
          // Suspending audio is best-effort only.
        }
        clearHeldInput();
      } else {
        AUDIO.resume();
      }
    }

    function handlePageHide() {
      saveBackgroundProgress();
    }

    function registerServiceWorker() {
      if (CONFIG.TEST || !('serviceWorker' in navigator)) return;
      try {
        navigator.serviceWorker.register('sw.js');
      } catch (err) {
        // PWA support is optional; the game still runs as a normal page.
      }
    }

    function init() {
      resize();
      loadAssets();
      buildMaps();
      SCENES.titleHasSave = SAVE.hasSave();
      if (PARAMS.get('selftest') === '1') SELFTEST.run();
      registerServiceWorker();
      window.addEventListener('resize', resize);
      window.visualViewport?.addEventListener('resize', resize);
      canvas.addEventListener('pointerdown', pointerDown);
      canvas.addEventListener('pointermove', pointerMove);
      canvas.addEventListener('pointerup', pointerUp);
      canvas.addEventListener('pointercancel', pointerUp);
      window.addEventListener('keydown', keyDown);
      window.addEventListener('keyup', keyUp);
      window.addEventListener('blur', clearHeldInput);
      window.addEventListener('pagehide', handlePageHide);
      document.addEventListener('visibilitychange', handleVisibilityChange);
      setTimeout(() => setState('Title'), 160);
      requestAnimationFrame(loop);
    }

    return {
      init,
      setState,
      debug: {
        CONFIG,
        AUDIO,
        INPUT,
        MAPS,
        ENTITIES,
        SYMBOLS,
        RHYTHM,
        DIALOGUE,
        QUEST,
        PUZZLES,
        HINTS,
        HINT,
        SAVE,
        UI,
        SCENES,
        get state() { return gameState; },
        get DATA() { return DATA; },
        noteToFreq: (name) => AUDIO.noteToFreq(name)
      }
    };
  })();

  window.MelodiaDebug = Game.debug;
  window.addEventListener('DOMContentLoaded', Game.init);
  </script>
</body>
